# aloop — single tunables file (on flash at /etc/aloop.conf).
# Change these without recompiling. Documented in docs/BOOT.md.

[audio]
sample_rate = 48000
block_size  = 64        # 1.333 ms per block — do not raise without reason
channels    = 1         # mono, as the looper
instrument_device = hw:0,0   # the REAL instrument/mic USB audio interface
                             # (e.g. M-Audio AIR 192|4) -- tight-latency
                             # capture+playback, the primary signal path a
                             # musician actually hears (ADR-015). Pin the
                             # exact card if more than one USB audio device
                             # may be plugged in besides the OTG gadget.
audio_device = hw:UAC2Gadget,0   # the f_uac2 OTG gadget -- a best-effort,
                                 # non-blocking MIRROR of the same output to
                                 # whatever host computer is on the OTG cable.
                                 # Never the primary path; do not use "default"
                                 # (dmix/dsnoop imposes its own large fixed
                                 # period and, unpinned, may resolve to a
                                 # different card entirely)

[cores]
# Which core runs what (matches the isolcpus set in kernel/cmdline.txt).
usb_io      = 0
home_fx     = 1
control     = 2
user_fx     = 3

[rt]
audio_priority = 95     # SCHED_FIFO priority for the audio threads
mlockall       = true

[effects]
home_dir = /effects/home     # the fixed home-FX LV2 bundle
user_dir = /effects/user     # drop your own .lv2 bundles here (hot-swap)
topology = serial            # serial | fork_join  (never a graph — ADR-002)
# disable_core3_lv2 = 1      # DIAGNOSTIC ONLY: skips homeFx/userFx.process()
                              # every block entirely (not just individual
                              # plugins). Uncomment to test whether the
                              # Core-3 LV2 host's own per-block call is
                              # involved in the live ~1Hz/~30-37ms stall
                              # investigation -- edit + restart the aloop
                              # service to apply, no rebuild needed.

[link]
enabled  = true
# Ableton Link uses the default multicast group/port; no config needed.

[wifi]
mode     = auto              # auto (autoAP) | sta | ap
ap_ssid  = aloop

[midi]
midi_device = auto          # "auto" scans hw:0..7 for the first MIDI input;
                            # or pin one explicitly, e.g. hw:1,0,0

[remote]
# Shared secret for the udp/4446 reboot + log-tail listener (docs/REMOTE-CONTROL.md).
# UNSET (commented out / no token line) = the listener is DISABLED — no remote
# reboot, no remote log-tail. Set a token to enable both, e.g.:
#   token = change-me-to-a-real-secret
# Anyone who knows this token can reboot the device over the network; treat it
# like a password, not a feature flag.
token = d5c3612a6c60271d47961bdfaea9f379
