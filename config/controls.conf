# aloop control map — REMAPPABLE. Binds incoming MIDI to controls. Edit this file
# to re-map any control; no recompile needed. Loaded by the MIDI thread at start.
#
# Format (one binding per line):
#   <midi>  <target>
# where <midi> is:
#   cc<N>[.<ch>]      a control-change on CC number N (optional MIDI channel ch)
#   note<N>[.<ch>]    a note number N (note-on = press)
# and <target> is one of:
#   looper<i>/rec       toggle/hold record for looper i (0..19)   [button]
#   looper<i>/play      toggle play for looper i                   [checkbox]
#   looper<i>/vol       looper i volume                            [slider 0..1]
#   looper<i>/erase     wipe looper i's loop (held)                [button]
#   fx/hp fx/lp fx/lpres fx/reverb fx/delay fx/time fx/formant fx/pitch  effect knobs
#   cmd/clearall cmd/stopall cmd/halfspeed cmd/doublespeed   global commands
# (mark-point restart — SET/CLEAR_LOOP_START/LOOP_IMMEDIATE — is a deliberate model
#  difference of the Faust delay-ring looper; see docs/COMMAND-SURFACE.md.)
#
# The DEFAULT below matches the current hardware (the APC-style layout). Change
# freely — e.g. move looper0/rec to a different pad by editing its cc/note.

# ---- effect knobs (the 6 effect CCs + formant) ----
# NOTE: cc1 (mod-wheel) and cc52 (absolute pitch) are NOT listed here — they are
# the real APC Key25's LIVE-PITCH controls (apcKey25.cpp) and are handled
# directly by the ApcGrid engine in src/control/midi.cpp (never reach this flat
# map). fx/pitch below is the STATIC pitch knob; live-pitch adds on top of it
# (see src/dsp/audio_thread.cpp SEMIS composition).
cc51   fx/hp
cc54   fx/lpres
cc55   fx/lp
cc48   fx/reverb
cc49   fx/delay
cc50   fx/time
cc53   fx/formant
cc57   fx/pitch

# ---- global commands ----
# The real APC Key25's transport buttons are NOTES (channel 0), not CCs
# (apcKey25.h APC_BTN_*). cmd/stopall is the hardware STOP_ALL button (0x51,
# note 81) unshifted; cmd/clearall is PLAY (0x5B, note 91) unshifted per
# apcKey25Notes.cpp _onButton (SHIFT+PLAY = loop-immediate, a model difference
# aloop doesn't have — see docs/COMMAND-SURFACE.md — so unshifted here).
note81  cmd/stopall
note91  cmd/clearall
cc70    cmd/halfspeed
cc71    cmd/doublespeed

# ---- the 5x8 pad grid (notes 0..39): NOT bound here ----
# The real grid (cols 0-1 = 10 presets, cols 2-5 = 20 loopers, tap=press/cycle,
# hold>=1s=erase/capture) is handled entirely by the ApcGrid engine in
# src/control/midi.cpp / src/control/apc_grid.cpp — grid notes never reach this
# flat map. See docs/CONTROLS.md and apc_grid.h for the row*8+col formula.

# ---- microrepeat latch (notes 82..86): NOT bound here ----
# Handled directly by ApcGrid (apc_grid.cpp onMicrorepeatOn/Off) — the 1/1..1/16
# beat-divisor latch, same as grid notes.
