# aloop control map — REMAPPABLE. Binds incoming MIDI to controls. Edit this file
# to re-map any control; no recompile needed. Loaded by the MIDI thread at start.
#
# Format (one binding per line):
#   <midi>  <target>
# where <midi> is:
#   cc<N>[.<ch>]      a control-change on CC number N (optional MIDI channel ch)
#   note<N>[.<ch>]    a note number N (note-on = press)
# and <target> is one of:
#   looper<i>/rec     toggle/hold record for looper i (0..19)   [button]
#   looper<i>/play    toggle play for looper i                   [checkbox]
#   looper<i>/vol     looper i volume                            [slider 0..1]
#   fx/hp fx/lp fx/lpres fx/reverb fx/delay fx/time fx/formant fx/pitch  effect knobs
#   cmd/clearall cmd/stopall cmd/halfspeed cmd/doublespeed       global commands
#
# The DEFAULT below matches the current hardware (the APC-style layout). Change
# freely — e.g. move looper0/rec to a different pad by editing its cc/note.

# ---- effect knobs (the 6 effect CCs + formant + pitch) ----
cc51   fx/hp
cc54   fx/lpres
cc55   fx/lp
cc48   fx/reverb
cc49   fx/delay
cc50   fx/time
cc53   fx/formant
cc52   fx/pitch

# ---- global commands ----
cc1    cmd/clearall
cc70   cmd/halfspeed
cc71   cmd/doublespeed

# ---- the 20 loopers: rec on notes 0..19, play on notes 20..39 (example layout) ----
note0   looper0/rec
note1   looper1/rec
note2   looper2/rec
note3   looper3/rec
note4   looper4/rec
# … loopers 5..19 rec on note5..note19 (elided; add as needed)
note20  looper0/play
note21  looper1/play
note22  looper2/play
note23  looper3/play
# … loopers 5..19 play on note25..note39
