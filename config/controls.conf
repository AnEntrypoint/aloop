# aloop control map — REMAPPABLE. Binds incoming MIDI to controls. Edit this file
# to re-map any control; no recompile needed. Loaded by the MIDI thread at start.
#
# Format (one binding per line):
#   <midi>  <target>
# where <midi> is:
#   cc<N>[.<ch>]      a control-change on CC number N (optional MIDI channel ch)
#   note<N>[.<ch>]    a note number N (note-on = press)
# and <target> is one of:
#   looper<i>/rec       toggle/hold record for looper i (0..19)   [button]
#   looper<i>/play      toggle play for looper i                   [checkbox]
#   looper<i>/vol       looper i volume                            [slider 0..1]
#   looper<i>/erase     wipe looper i's loop (held)                [button]
#   fx/hp fx/lp fx/lpres fx/reverb fx/delay fx/time fx/formant fx/pitch  effect knobs
#   cmd/clearall cmd/stopall cmd/halfspeed cmd/doublespeed   global commands
# (mark-point restart — SET/CLEAR_LOOP_START/LOOP_IMMEDIATE — is a deliberate model
#  difference of the Faust delay-ring looper; see docs/COMMAND-SURFACE.md.)
#
# The DEFAULT below matches the current hardware (the APC-style layout). Change
# freely — e.g. move looper0/rec to a different pad by editing its cc/note.

# ---- effect knobs (the 6 effect CCs + formant) ----
# NOTE: cc1 (mod-wheel), cc52 (absolute pitch), and cc53 (formant) are NOT
# listed here — cc1/cc52 are the real APC Key25's LIVE-PITCH controls
# (apcKey25.cpp) and cc53 needs the SHIFT-dependent deadzone+range curve
# (apcKey25Filters.cpp:53-58) a flat 1:1 binding can't express; all three are
# handled directly by the ApcGrid engine in src/control/midi.cpp (never reach
# this flat map). fx/pitch below is the STATIC pitch knob; live-pitch adds on
# top of it (see src/dsp/audio_thread.cpp SEMIS composition).
cc51   fx/hp
cc54   fx/lpres
cc55   fx/lp
cc48   fx/reverb
cc49   fx/delay
cc50   fx/time
cc57   fx/pitch

# ---- global commands ----
# The real APC Key25's transport buttons are NOTES (channel 0), not CCs
# (apcKey25.h APC_BTN_*). cmd/stopall (note81, unshifted STOP_ALL) is real --
# src/control/midi.cpp only intercepts note 0x51 for the SHIFT-held variant
# (onStopImmediate), so the unshifted press still reaches this flat binding.
# note91 (PLAY) is intercepted UNCONDITIONALLY in midi.cpp (both unshifted
# and shift-held) so ApcGrid::onClearAll can reset its own shadow state in
# the same call that wipes the DSP. WITNESSED bug: this line was previously
# live here WHILE midi.cpp's own note-91 intercept was gated on
# `!grid.shiftHeld()` -- pressing PLAY while SHIFT was held (e.g. still
# releasing SHIFT from an adjacent gesture) skipped the intercept entirely
# and fell through to THIS flat binding, which sets cmd/clearall directly
# without ever calling ApcGrid::onClearAll -- wiping the DSP's loop content
# and cmd/master_len while ApcGrid's shadow state (m_looperHasContent,
# m_masterLenSamples) stayed stale, so the next press silently produced a
# "recording" that was never actually armed (rec never set to 1): a blank
# loop with no diagnosable clear-all event in the shadow-state log. Fixed by
# removing this binding (midi.cpp's intercept is now unconditional on shift,
# see below) -- do not re-add a live note91 binding here.
note81  cmd/stopall
# WITNESSED bug fix: these were previously bound as cc70/cc71 (continuous
# controllers), but the real APC Key25 sends NOTES 70/71 on channel 0 for the
# momentary speed-scrub buttons (apcKey25.cpp:142-143,187-188 -- channel==0
# && data1==70/71 checks, not a CC lookup). A cc70/cc71 binding could never
# match what the real hardware actually transmits, so halfspeed/doublespeed
# likely never worked on real hardware at all. Fixed to note70/note71.
note70  cmd/halfspeed
note71  cmd/doublespeed

# ---- the 5x8 pad grid (notes 0..39): NOT bound here ----
# The real grid (cols 0-1 = 10 presets, cols 2-5 = 20 loopers, tap=press/cycle,
# hold>=1s=erase/capture) is handled entirely by the ApcGrid engine in
# src/control/midi.cpp / src/control/apc_grid.cpp — grid notes never reach this
# flat map. See docs/CONTROLS.md and apc_grid.h for the row*8+col formula.

# ---- microrepeat latch (notes 82..86): NOT bound here ----
# Handled directly by ApcGrid (apc_grid.cpp onMicrorepeatOn/Off) — the 1/1..1/16
# beat-divisor latch, same as grid notes.
