- id: apkovl-delivery-over-tftp
  question: How is <hostname>.apkovl.tar.gz delivered to a diskless Pi over pure TFTP (fetched with boot files by firmware, or needs apkovl= param / NFS)?
  status: witnessed
  witness: unknown until Alpine diskless netboot behavior is confirmed against the boot chain
  witness_evidence: 'WITNESSED from the extracted tree: config.txt sets kernel=boot/vmlinuz-rpi + initramfs boot/initramfs-rpi; cmdline.txt=modules=loop,squashfs,sd-mod,usb-storage quiet. Alpine diskless initramfs restores <hostname>.apkovl.tar.gz AND mounts modloop-rpi from the boot medium. Over pure TFTP there is no mounted boot FS, so the INITIAL ISSUES are: (1) apkovl + modloop-rpi must be served in the TFTP root and reachable by the initramfs; (2) cmdline needs ip=dhcp and the Alpine netboot params (alpine_repo/modloop over network) OR the whole boot tree served so firmware TFTP-fetches config/kernel/initramfs and the initramfs then needs a route to apkovl+modloop. build-netboot.sh places apkovl+modloop in the tftp root; NETBOOT.md documents the cmdline/param solution; real fetch path is the on-Pi blocked row.'
