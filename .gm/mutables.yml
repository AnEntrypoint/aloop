  status: witnessed
  witness: ../looper/loopMachine.cpp:743-792 pLivePitchWrapper + RubberBandWrapper.h — read which engine
  witness_evidence: 'RubberBandWrapper.h:10-17: ONLY EngineSoladSnac is in the live pitch path; signalsmith/yinPsola/sincFormant are DEAD members (removed, bloated the allocation). So aloop live pitch = EngineSoladSnac (soladSnacOctaver.h + grainFormant.h) — EXACTLY what dubfx reproduced+linked via ffunction. No signalsmith/RubberBand runtime dep needed for the live path. The dubfx pitch LV2 is directly reusable.'
