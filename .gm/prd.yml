- id: loop-dsp-len-zone-missing-from-cli-listzones
  subject: 'Discovered while verifying the new sidechain-pump signal wiring via dsp_cli.exe --list-zones against a freshly compiled dsp/loop.dsp: every per-looper zone (erase/finishreq/finishtarget/level/play/rec/sidechainsrc/vol/writeidx) appears exactly once per looper as expected, but ''len'' (hslider("len", 48000, 64, MAXLEN, 1)) is completely ABSENT from the --list-zones output for all 20 loopers, even though the .dsp source clearly declares it identically to vol/etc. Not caused by this session''s sidechain edit (lenN''s own declaration in loop.dsp is untouched). Needs investigation: either the CLI harness''s FaustUI shim has a bug specifically affecting this control (possibly a name collision with something else in the shim, or a slider-vs-other-primitive registration difference), or Faust''s own dead-code elimination is somehow dropping it in this specific compiled configuration -- worth checking whether len is truly reachable from `out` in the current oneLooper (it''s read by wrapLenStep/wrapLen only during idle-fallback, so trace whether that path is provably dead given finishRequested''s own always-fires-via-apc_grid.cpp invariant, which would mean Faust''s own DCE is CORRECTLY eliding it as unreachable, not a harness bug at all). This is a real discrepancy between source and compiled zones that should be understood, not just noted -- genuinely unrelated to the sidechain-pump work in progress, tracked separately per gm''s own noticing-to-PRD discipline.'
  witness: 'Root cause found via direct trace, not a harness bug: dsp/loop.dsp''s own top-of-file history comment (the ''ROOT CAUSE (silence ever since TRUE varispeed''s rwtable redesign)'' block, lines ~257-297) documents that wrapLen used to latch from lenN at armEdge, but was REDESIGNED to latch from writeIdx/finishTargetN at finishEdge instead -- lenN was left DECLARED but never wired into the new mechanism. Grepped dsp/loop.dsp for \\blenN\\b: exactly one hit (the declaration itself at line 119); every other match is inside COMMENT TEXT describing why the old lenN-based approach was replaced. lenN is genuinely unreferenced in the DSP body, so Faust''s own dead-code elimination correctly drops it from the compiled zone list -- not a CLI harness bug, not a Faust compiler defect. This IS a real vestigial-code finding though: src/control/apc_grid.cpp:263 still actively calls setLooper(ps, lp, \"len\", masterLenSamples) every finish, writing into a Faust zone that now does nothing at all -- a wasted (harmless but confusing) write. Filed as its own cleanup row (loop-dsp-dead-len-control-cleanup) rather than silently fixed inline, since removing a UI control + its C++ writer is a real code change deserving its own witnessed row, not folded into this discovery row''s resolution.'
