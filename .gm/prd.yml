- subject: 'DESIGN NOTE (measure-twice-cut-once pass, this session): precise Faust mechanism for finish-quantization, worked through before implementation. New per-looper Faust zones: finishTargetN (hslider, the chosen quantized target sample count, pushed by C++ the INSTANT the finish press lands, BEFORE recN is released) and a NEW internal-only concept -- Faust must NOT derive write-continuation from recN''s own value anymore once a finish has been requested, since recN gets released to 0 immediately at the press (existing simple button semantics preserved, no MIDI-thread changes needed). Instead: a NEW internal Faust state signal, writingActive, starts true at armEdge and stays true until writeIdx reaches finishTargetN (checked once finishTargetN becomes nonzero/valid, i.e. once a finish has actually been requested -- while writingActive is still true from ARM but no finish has been requested yet, keep writing indefinitely as today). The REAL finishEdge (which drives wrapLen-latch and recordStartPhaseOffset-latch) becomes: the sample where writingActive transitions true->false (writeIdx crosses finishTargetN), NOT recN''s own falling edge. writeVal''s recN gate must also change to writingActive''s gate, not recN directly, so writing genuinely continues past the button release when extending. Backdate case (target already passed when requested) resolves naturally: writeIdx is already >= finishTargetN the very first sample writingActive is checked against it, so it stops within one sample of the request, retroactively -- but the ALREADY-WRITTEN samples beyond the target (during the raw take before the request) are already in the ring; wrapLen latching to finishTargetN (a SMALLER value than raw writeIdx) means those extra written samples past the target index are simply never read back (ring positions beyond wrapLen-1 are unreachable via readIdx0/1''s own %wrapLen), so backdating is a pure latch-a-smaller-boundary operation with no need to erase/undo anything already written -- clean and simple. MUST trace the full dependency graph for cycles before implementing: finishTargetN/finishReqN are process()-level per-looper UI zones (correctly per-looper via par(), NOT shared signals -- this is INTENTIONALLY different from masterPhase/effSpeed/clearAll which must be shared), writingActive depends on writeIdx and finishTargetN, finishEdge depends on writingActive''s own edge (a NEW recursion), wrapLen/recordStartPhaseOffset still latch at finishEdge as before -- verify writeIdx''s own recursion does not end up depending on writingActive in a way that creates a cycle back through finishEdge (writeIdx''s write-gate changes from recN to writingActive, but writeIdx''s COUNTING logic itself should remain independent of finishEdge/wrapLen exactly as before, only the GATE condition changes).'
