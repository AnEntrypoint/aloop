  subject: effects/home/faust/compressor.dsp's current (excess-only softLimit) generation is a major improvement -- genuinely monotonic RMS rise (0.3535->0.3536->0.7779->0.7781 across COMPRESSAMT 0.0/0.5/0.9/1.0 on a 0.5-amplitude sine, verified via dsp_cli), byte-exact passthrough at 0.0/0.5 (mathematically proven identity when |v|<=1, not just empirically close), and peak is now MUCH closer to unity than prior generations (1.1512-1.1578 raw at 0.9/1.0, vs 1.7+ in the tanh-normalizer-bug generation) -- softLimit(v)'s own design is mathematically bounded within (-2,2) and the measured ~1.15-1.16 overshoot is well inside that proven bound. However this residual ~15% overshoot ABOVE +-1 on individual raw samples (before this specific dsp_cli WAV-writer's own [-1,1] clamp) is still non-zero, and a grep of src/dsp/audio_thread.cpp found NO general final-output clamp on the audible mix before it is converted to the s32 wire format for playback -- meaning if this compressor stage is reached at a high COMPRESSAMT setting in the real signal chain (once effects_runtime.dsp wires it into guitarChain, a separate not-yet-done integration step), the ~15% overshoot could produce audible clipping/wraparound at the final s32 conversion unless EXCESS_DRIVE is tuned tighter (fully eliminating overshoot, at the cost of a slightly less 'blown out' loud extreme) OR a final hard safety clamp is added at the very end of the whole effects chain (not just this one stage) as defense-in-depth. This is a smaller, more precisely scoped remaining concern than the original bug -- recommend either tightening EXCESS_DRIVE further (test higher values, e.g. 10-15, and re-verify RMS still rises meaningfully) or confirming/adding a chain-wide final clamp before this compressor is wired into the guitar bank's actual signal path.
