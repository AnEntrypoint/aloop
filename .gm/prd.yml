- id: fix-aloop-service-rc-ulimit-memlock
  subject: 'Fixed a real, independent correctness bug found while investigating the audio-thread segfault: kernel/rt-tune.sh sets `ulimit -l unlimited` for mlockall, but that ulimit change was scoped to a transient local.d/*.start subshell (OpenRC''s `local` service `eval`s each script and exits after start() returns) and NEVER reached the actual aloop process, a separate service started later. Confirmed live: `ulimit -l` on the booted device showed the 8192 KB default, not unlimited, meaning mlockall(MCL_FUTURE) never actually got the memory guarantee rt-tune.sh''s own design intended. Fixed via OpenRC''s rc_ulimit="-l unlimited -r 95" directive on the aloop service itself (the correct, service-scoped mechanism, read by openrc-run.sh before exec''ing the command). This is a genuine fix independent of the still-open SIGSEGV investigation -- manually testing with ulimit -l unlimited applied did NOT resolve that separate crash.'
  status: completed
  witness: image/lib-boot-tree.sh etc/init.d/aloop service now sets rc_ulimit="-l unlimited -r 95", the correct OpenRC per-service mechanism (verified openrc-run.sh reads rc_ulimit/RC_ULIMIT and applies it via a plain ulimit call before exec'ing the service command). Verified the exact syntax works live on the device via sh -c.
