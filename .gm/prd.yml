- subject: 'WITNESSED live immediately after fixing the execFileSync hang: making the rebuild async let the 30s setInterval tick fire again WHILE a prior rebuild was still running, spawning THREE concurrent build-netboot.sh invocations writing the SAME output directory (confirmed in .netboot-serve.log: three consecutive ''new build found''/''rebuilding'' lines before the first one finished). Added an updateInFlight boolean guard (set before the execFileAsync, cleared in a finally) so checkAndUpdate skips (logs ''rebuild already in progress'') rather than launching an overlapping rebuild.'
