- id: granulator-cpu-budget-check
  subject: 'Validation: the granulator (multiple overlapping grain voices, each an independent interpolated read + envelope) adds real CPU cost on top of the existing 20-looper + effects chain, which already runs on a real-time budget (RT-TUNING.md documents the Pi 4''s per-block deadline). Profile the granulator''s actual CPU cost via the CLI DSP harness or a native benchmark before assuming it fits the existing budget -- if it doesn''t, may need a bounded max-grain-voice-count or simplified grain-scheduling to stay real-time-safe on the Pi 4 target.'
  status: completed
  witness: 'Profiled via a background agent''s standalone benchmark (deleted after use, not kept as a fixture): docs/RT-TUNING.md + audio_thread.h confirm the real per-block budget is 1333.3us (block=64 samples @ 48kHz). Worst-case granulator load (all 16 sampler voices active, MAX_GRAINS=48/48 fully saturated via max grain size + max density, verified empirically via activeVoices/activeGrainCount before timing) measured over 1000 blocks on x86: avg ~54-83us (~4-6% of budget), p99 ~108-138us (~8-10%), one outlier run at 30.5% attributed to Windows scheduler jitter (no RT scheduling on this dev box) rather than an algorithmic spike -- the grain-render inner loop is a fixed-length scan over a pre-allocated 48-slot array, no allocation, no data-dependent branching cost, so it should not spike on real hardware the way it did on this non-RT dev box. Explicit caveat: x86 timing is directional only, not a Pi 4 (Cortex-A72) guarantee -- real Pi 4 percentages will likely be meaningfully higher (rough estimate 2-4x based on typical per-cycle throughput ratios), and this is ADDITIVE cost on an already-tight existing 20-looper+effects budget, not measured in isolation. Verdict: borderline-not-comfortable at worst-case saturation -- does not blow the deadline outright on this reference class but margin is not generous. Recommendation (not yet implemented, a real Pi 4 measurement should confirm before deciding): the bounded/lower max-grain-count fallback this row''s own description already flagged as a possible mitigation is a reasonable hedge given the borderline result.'
  commit_comment: 'Profile granulator worst-case CPU cost: borderline (~4-6% avg, ~8-10% p99 of RT budget on x86), real Pi 4 measurement recommended before final verdict'
