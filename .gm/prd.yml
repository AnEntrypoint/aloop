- subject: 'WITNESSED live: the netboot-serve process (image/serve-netboot-win.js) got stuck for 5+ minutes with zero log output mid-rebuild after detecting a new CI build, blocking the self-update loop and (per the user''s explicit request) needing to auto-update reliably like ../looper''s tftp-server.js does. Root cause: checkAndUpdate()''s rebuild step used execFileSync (synchronous, no timeout) to shell out to build-netboot.sh -- this freezes the ENTIRE Node event loop for the full duration of the rebuild (no DHCP/TFTP/HTTP serving, no further checkAndUpdate ticks), and with no timeout, a genuinely stuck child process (unlike anything in looper''s own checkAndUpdate, which is just a download+unzip+file-copy with no long subprocess at all) hangs the whole server indefinitely with no error logged. Fixed: converted to async execFile (promisified, awaited) so the event loop keeps serving throughout, with an explicit 5-minute timeout so a stuck rebuild is killed and the surrounding try/catch logs a real error and retries on the next 30s tick, matching looper''s self-healing ''any failure caught, next tick tries again'' design.'
