- subject: 'WITNESSED live, this turn: ''when our second loop is short, it doesnt take the start and stop timing it its making it longer and offsetting the position instead of matching it.'' ROOT CAUSE CONFIRMED: dsp/loop.dsp''s wrapLen is latched purely from writeIdx''s RAW elapsed recording sample count at finishEdge -- it never reads lenN (the Faust zone apc_grid.cpp''s quantization logic writes the nicely-quantized target into). So even though the M/16 candidate-range fix landed, the DSP simply ignores the quantized target entirely and plays back whatever was literally recorded, at its raw un-quantized length -- explaining both ''making it longer'' (raw length often exceeds the intended short division) and ''offsetting the position'' (recordStartPhaseOffset anchors to masterPhase at the ACTUAL finishEdge instant, which is now wrong since the write boundary itself is wrong). REQUIRED FIX per user''s exact design (confirmed via direct clarification, this session): when the FINISH press lands, extend or trim the actual recording to hit the nearest quantized target sample-accurately in Faust (not just relabel the C++ shadow state) -- ''when the loops are longer or shorter than the first loop it should snap to the most sensible in-phrase multiple or division of the loop'', and specifically directional: ''it should wait when waiting is closer, and backdate if pressed just too late instead of waiting for the next one'' -- i.e. nearest-candidate semantics (if raw elapsed is closer to the NEXT-below candidate, trim/backdate to it immediately; if closer to the NEXT-above candidate, keep recording a few more samples until reaching it, then stop), never always-round-up or always-wait-for-the-far-side. This requires new Faust-side logic: at the FINISH press, C++ computes both bracketing candidates and determines direction, pushes the chosen TARGET sample count into lenN (already exists as a per-looper zone) without yet releasing rec -- Faust internally continues recording (ignoring the button release) until writeIdx reaches the target if extending, or the target has already been passed (trim immediately) if backdating, and Faust itself fires the real finishEdge/wrapLen-latch at that exact sample-accurate instant, not at the button press instant. Design worked through carefully this session (measure-twice-cut-once discipline) -- implement precisely, tracing the full Faust dependency graph for cycles before writing code, given three RMW/mutual-recursion-class compile risks already encountered this session with simpler changes.'
