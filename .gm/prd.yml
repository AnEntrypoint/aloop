  witness: 'Reviewed the actual implementation in C:\dev\aloopvst\Source\LooperEngine.h (lines 128-185, full derivation comment) and LooperEngine.cpp (exportLooperRing at line 366, importLooperRing at line 483, ~270 new lines). The solution reads the ring content through the DSP''s OWN legitimate signal path -- no Faust source changes: EXPORT sweeps the process()-level masterPhase input across a full wrapLen span (wrapLen read back via the persistent ''finishtarget'' zone) while soloing the looper, since readPos=wrapAbs(masterPhase-recordStartPhaseOffset,wrapLen) is a bijection mod wrapLen regardless of the unknown offset constant -- verified this reasoning traces correctly against dsp/loop.dsp''s actual absPos/readPos formulas (lines 421-447). IMPORT re-records via a REAL ARM->FINISH cycle (prevFiltIn fed as the record source, finishtarget/finishreq pulsed) -- not an approximation, the same mechanism a live recording uses. A genuine ordering bug (rec must release BEFORE finishtarget/finishreq push, or recordingGate''s recN term keeps writeIdx advancing past the target) was caught and fixed during implementation, traced against dsp/loop.dsp''s exact recordingGate boolean logic (lines 574-592 comment in LooperEngine.cpp). masterPhase is deliberately held at 0 during every looper''s import so all restored loopers share the same recordStartPhaseOffset and stay mutually phrase-locked post-reload. PluginProcessor.cpp''s getStateInformation/setStateInformation call these at lines 311/380, replacing the prior zero-length placeholder. No dsp/loop.dsp or dsp/aloop.dsp changes -- the vendored byte-identical DSP contract is preserved.'
  commit_comment: 'Closed the ring-buffer audio persistence gap: session save/load now restores real recorded loop audio via an offline export/import pass through the DSP''s own signal path, not just scalar state flags.'
- id: vst-maxlen-hardcoded-48khz-gap
  subject: 'dsp/loop.dsp''s MAXLEN = 48000*60 is a Faust COMPILE-TIME constant baked directly into the generated rwtable(MAXLEN, ...) ring buffer size -- faustHome_->init(sampleRate) only sets a runtime sample-rate variable, it cannot resize a compile-time array bound. At a host running 96kHz, the ring buffer is still only sized for 48000*60 samples = 30 seconds of real time, not 60 -- the ''up to 60s per looper'' capacity silently shrinks at higher sample rates, and at sample rates below 48kHz the capacity is wasted (over-allocated). This contradicts vst-sample-rate-block-size-flexibility''s premise that prepareToPlay''s reinit alone makes the DSP sample-rate-correct -- it makes the AUDIBLE processing correct (pitch/timing) but NOT the loop-length ceiling. Fix: either (a) compute MAXLEN from the host''s real sample rate at Faust-compile time via a per-sample-rate set of pre-generated loop.cpp variants selected at build/init time (impractical -- would need N compiled variants), or (b) the more practical fix: document and enforce the ACTUAL capacity ceiling as 48000*60 SAMPLES (not seconds) throughout the C++ layer -- i.e. the real limit is 2,880,000 samples regardless of host sample rate, so at 96kHz the true ceiling is 30 seconds and at 44.1kHz it''s ~65.3 seconds; surface this correctly (in samples, not a hardcoded ''60s'' assumption) anywhere the plugin communicates capacity to the user (UI, docs, state save validation) rather than silently overrunning or displaying a wrong duration.'
  status: completed
  witness: 'Fixed at C:\dev\aloopvst\Source\ApcControlSurface.h line 125 (setSampleRate): previously computed kMaxLoopSamples_ = (long)(60.0 * sr), which at a 96kHz host would have set the ceiling to 5,760,000 samples -- roughly DOUBLE the Faust-compiled rwtable''s true fixed capacity of 48000*60=2,880,000 samples (dsp/loop.dsp line 395''s rwtable(MAXLEN,...), a compile-time constant that init(sampleRate) cannot rescale). This let the finish-quantization bracket search (ApcControlSurface.cpp''s applyRecPlayCycle) propose lengths the DSP would silently truncate via its own writeIdx clamp (min(prev+1, MAXLEN-1), dsp/loop.dsp line 358), with no error signal back to the C++ layer -- a real data-loss bug at any non-48kHz host rate. Fixed: setSampleRate no longer touches kMaxLoopSamples_ at all; it stays at its correct fixed default (kMaxLoopSamplesDefault = 48000*60 samples, matching the real compiled ring size regardless of host rate), with a comment explaining the true per-sample-rate real-time-seconds equivalent (30s at 96kHz, ~65.3s at 44.1kHz) for anywhere capacity is surfaced to the user.'
  commit_comment: 'Fixed a real capacity-overrun bug: the quantization bracket search''s max-length ceiling was incorrectly scaled by host sample rate, when the Faust-compiled ring buffer''s true capacity is a fixed sample count independent of sample rate.'
