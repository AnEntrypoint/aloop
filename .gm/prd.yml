- id: netboot-firmware-chain-present
  subject: Verify the Alpine RPi tarball provides the Pi4 TFTP-boot firmware chain (start4.elf, fixup4.dat, bcm2711-rpi-4-b.dtb) needed for network boot; if any are missing from the tarball, source them so the netboot root is complete.
  witness: 'WITNESSED by fetching+listing the Alpine RPi tarball AND by validate-netboot.sh on the built root: start4.elf, fixup4.dat, bootcode.bin, bcm2711-rpi-4-b.dtb ALL present. No external firmware sourcing needed — the stock tarball is complete for Pi4 TFTP boot.'
  status: completed
- id: netboot-witness-execution
  subject: 'WITNESS: actually run build-netboot.sh (layout-only, no binary needed) and validate-netboot.sh via exec_js/Bash, reading real output confirming the netboot root is assembled and structurally serviceable. This is the pre-SD dry run the user asked for.'
  witness: 'WITNESSED THIS SESSION (the pre-SD dry run the user asked for): build-netboot.sh assembled the root exit 0, validate-netboot.sh printed NETBOOT ROOT VALID exit 0 with every structural check OK. The netboot path is proven serviceable before any SD card is touched.'
  status: completed
