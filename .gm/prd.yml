- id: sidechain-pump-source-designation
  subject: 'RESOLVED via user grilling session. Multiple simultaneous sources ARE allowed (not single-source). Gesture: hold guitar-fx + press a looper pad = TOGGLE that looper''s source status (press once to add, press again while still held to remove); sources PERSIST after releasing guitar-fx (not cleared on release). Sidechain-pump sits OUTSIDE the Faust fx chain entirely -- a separate, always-on/global loop-bus stage (independent of bank selection and SHIFT state), unlike every other new effect in this feature which is SHIFT-gated fx-chain input effects. Ducking: a shared envelope (max/peak-combined across all currently-active source loopers'' amplitudes) is broadcast to every looper as a NEW process()-level signal input (7th one, alongside in/prevFiltIn/clearAll/effSpeed/masterPhase/masterLen), applied as a per-looper gain-reduction multiplier to every NON-source looper''s own output before the sum; each looper also needs a new per-looper ''is this looper currently a source'' exclusion flag so a source looper never ducks itself. Erasing/clearing a looper auto-clears its source-designation flag (see sidechain-source-looper-cleared-or-erased, now resolved the same way).'
  status: completed
  witness: 'DSP-side signal routing now complete, closing this row''s remaining half (control-surface gesture half was already resolved). Implemented in dsp/loop.dsp: oneLooper gained a 7th process()-level signal input (sidechainEnv, broadcast identically to all 20 loopers, same par()-duplication-avoidance technique as masterPhase/masterLen/effSpeed/clearAll -- verified safe at 7 inputs via parN-count-limit-check) plus a per-looper isSourceN checkbox (safe to declare per-instance since it is NOT a shared broadcast value) bound to a new looperN/sidechainsrc ParamStore zone (src/control/apc_grid.cpp''s bindAll + onSidechainLooperToggle, generically pushed into Faust via the existing targetToZone/forEach mechanism, zero new per-block C++ needed). duckGain = 1.0 - sidechainEnv*(1.0-isSourceN) applied only to the playback term (out = loopSig*playN*volN*duckGain), never the record path. audio_thread.cpp computes sidechainEnv each block as max(looperLevel[lp] for lp where sidechainsrc>0.5) -- one-block-lag, same staleness class already accepted for prevFiltIn/prevLoopSum. Verified via a standalone Faust repro (test_duck.dsp, since exercised) isolating the exact duckGain formula: non-source looper''s rms dropped 0.3536->0.1936 when envelope stepped to 1; source looper''s rms stayed EXACTLY 0.3536 (unchanged, full self-exclusion) under the identical envelope step. dsp/loop.dsp itself also compiles cleanly end-to-end via the CLI harness (--list-zones confirms looperN/sidechainsrc present exactly once per looper, no duplication) -- required first fixing a real dsp_cli.cpp bug found along the way (stack-overflow on the full 20-looper struct, same class as the real codebase''s own ADR-013, fixed via heap allocation).'
