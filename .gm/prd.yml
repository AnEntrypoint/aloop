  subject: 'docs/NETBOOT.md documents a KNOWN issue: a netbooted Pi''s eth0 (brought up by ip=dhcp in the initramfs) can drop after userspace starts unless the apkovl explicitly enables the networking service + /etc/network/interfaces eth0 dhcp -- image/build-netboot.sh''s netboot overlay (section 3b) claims to already inject this. Verify that injection is still correct and actually present in the CURRENT apkovl (it may have regressed since this was fixed, or the self-update path''s rebuilt apkovl might not carry it if build-netboot.sh''s overlay step were ever skipped) -- if eth0 drops, telemetry/status queries are exactly why we can''t currently reach the Pi post-boot.'
  status: completed
  witness: 'Confirmed working correctly: eth0 stayed up and pingable throughout the entire boot sequence and after (multiple ping rounds succeeded, ARP entry stayed dynamic/present) -- the previously-fixed overlay injection (image/build-netboot.sh section 3b: /etc/network/interfaces eth0 dhcp + networking service enabled) is intact and functioning. The actual blocker preventing reachability was NOT eth0 dropping -- it was Windows ICS (Internet Connection Sharing) running a competing DHCP server on the same NIC, causing the initramfs udhcpc round to never complete with our server (matching the exact failure mode docs/NETBOOT.md section 5 already predicted). User disabled ICS and set a static 192.168.137.1/24 IP on the adapter (elevated, outside this session''s privilege); after that fix, the initramfs DHCP round completed (dynamic ARP entry appeared) and the Pi stayed reachable through full boot.'
- id: witness-live-telemetry-from-booted-pi
  subject: Actually query the booted Pi's telemetry (echo status | nc -u <pi-ip> 4445, or curl the status.json if some other transport is reachable) to get the REAL JSON showing core_busy/xruns/link/wifi/loopers -- this is the concrete proof aloop is running, matching docs/FLASHING.md section 5's documented verification method. This is the single piece of evidence that actually answers the user's complaint (no sound, no controls) -- if telemetry answers, aloop is alive and the remaining gap is audio/USB-specific (needs a connected USB host to verify sound) or MIDI-specific (needs a connected controller); if telemetry does NOT answer, the OpenRC service itself is failing to start or the network path is broken, which is the real bug to chase.
  status: completed
  witness: 'Queried udp/4445 status 5+ times over ~50 seconds post-boot (after confirming the Pi was pingable and had fetched its base packages over HTTP) -- zero replies every time. This IS the concrete evidence requested: telemetry does NOT answer, meaning the aloop process is not running/listening, not that the network path is broken (ping worked throughout). Root cause traced to the missing etc/apk/world entry for alsa-lib/lilv (see verify-aloop-service-actually-runs-on-netboot) -- the binary cannot dynamically link without them and would fail at process start, before telemetry''s UDP bind ever happens.'
- id: fix-vendor-libstdcxx-libgcc
  subject: 'Fixed a THIRD real bug found live via SSH: after fixing the executable-bit bug, aloop still failed with Error loading shared library libstdc++.so.6/libgcc_s.so.1 -- aloop is C++ and the musl/Alpine minimal base doesn''t ship the GCC C++ runtime. Vendored libstdc++.so.6 (from libstdc++ 13.2.1_git20240309-r1) and libgcc_s.so.1 (from libgcc, same version) into vendor/lib-aarch64/, wired into boot_tree_apkovl alongside the alsa/lilv vendoring, and extended both validate-netboot.sh and validate-image.sh''s hard-fail lib checks to 8 libraries.'
  status: completed
  witness: 'vendor/lib-aarch64/libstdc++.so.6 + libgcc_s.so.1 added (real ELF aarch64 shared objects, confirmed via file(1)); boot_tree_apkovl copies them alongside the existing 6; validate-netboot.sh/validate-image.sh extended to 8-library hard-fail checks. Live SSH test confirmed: the specific ''Error loading shared library libstdc++.so.6/libgcc_s.so.1'' lines are gone from a fresh boot after this fix.'
- id: fix-netboot-apkovl-exec-bit-lost-on-windows-build
  subject: 'Found and fixed a FOURTH, arguably the most fundamental, real bug: chmod +x on this Windows/Git-Bash (NTFS) host is a SILENT NO-OP -- every netboot root built locally on this dev host shipped /opt/aloop/aloop as -rw-r--r--, so OpenRC''s start-stop-daemon failed with Permission denied and aloop crash-looped forever with NO other symptom (confirmed via live SSH: rc-status showed aloop [crashed], /var/log/aloop.log showed exactly that one line). CI (ubuntu-latest) is completely unaffected since real Linux chmod works. Fixed via a two-pass tar build in both lib-boot-tree.sh''s apkovl packaging AND build-netboot.sh''s eth0-overlay repack step (which independently re-extracts+repacks and silently re-loses the bit) -- tar --mode=+x forces the executable bit on specific archive entries regardless of what chmod actually achieved on the build host''s filesystem, verified reproducible via WSL extraction (real Linux fs) showing -rwxr-xr-x.'
  status: completed
  witness: 'image/lib-boot-tree.sh + image/build-netboot.sh both use a two-pass tar (base tree, then tar --mode=''+x'' -rf on the executable paths with matching ./-prefixed names so the append updates rather than duplicates the entry) with a verification check reading the LAST matching tar entry''s mode. Verified via WSL extraction (real Linux filesystem): opt/aloop/aloop extracts as -rwxr-xr-x. Live SSH confirmed: ls -la /opt/aloop/aloop on the booted device shows -rwxr-xr-x, and OpenRC''s start-stop-daemon no longer reports Permission denied.'
- id: fix-vendor-alsa-config-data
  subject: 'Fixed a FIFTH real bug found live via SSH: even with libasound.so.2 vendored, aloop segfaulted inside alsa-lib''s own config parser trying to resolve the default PCM device, because /usr/share/alsa/alsa.conf (which defines the default alias) was never vendored -- only the .so binary was, not alsa-lib''s own runtime config data. Vendored the whole usr/share/alsa/ tree (~340K: alsa.conf + cards/ + ctl/ + pcm/) into vendor/share-alsa/, wired into boot_tree_apkovl. This eliminated the alsa.conf-related segfault (confirmed: the specific stderr lines about alsa.conf are gone from a fresh boot) but a DIFFERENT segfault (exit 139) still occurs deeper in the audio pipeline -- see investigate-alsa-kernel-subsystem-missing.'
  status: completed
  witness: 'vendor/share-alsa/ (alsa.conf + cards/ + ctl/ + pcm/, ~340K from the real alsa-lib 1.2.11-r0 package) added and wired into boot_tree_apkovl at usr/share/alsa/. Live SSH confirmed: the ''Cannot access file /usr/share/alsa/alsa.conf'' / ''Unknown RawMidi hw:N,0,0'' stderr lines are completely gone from a fresh boot after this fix (previously appeared 8x, once per hw:0..7 MIDI probe attempt).'
- id: investigate-alsa-kernel-subsystem-missing
  subject: 'aloop still segfaults (exit 139) even with all runtime libs + alsa config data vendored. Root cause traced further via SSH: /proc/asound doesn''t exist at all (not even empty) -- ALSA''s kernel subsystem is not loaded, and /lib/modules is completely empty (find / -iname *.ko* found zero files anywhere). modloop-rpi IS fetched over HTTP during boot (confirmed in the serve log, GET returns 200) but dmesg shows no squashfs-mount or modules-extraction step ever running for it -- the diskless init jumps straight from DHCP to apkovl-loading with no modloop step logged in between. This means the USB f_uac2 gadget setup (needs configfs + libcomposite kernel module) AND presumably the actual audio subsystem cannot come up on a NETBOOTED device, even though the exact same mechanism must work on the SD-image path (which presumably mounts modloop from the local FAT partition, not over HTTP) -- need to determine whether Alpine''s diskless init genuinely supports fetching+mounting modloop over HTTP for netboot specifically, or whether this is a netboot-only gap that needs its own fix (e.g. explicitly extracting/mounting modloop-rpi in a local.d script if the init script doesn''t do it for the HTTP case).'
  status: completed
  witness: 'Root cause found by extracting the Alpine RPi initramfs''s own /init script (via WSL cpio): `rc_add modloop sysinit` (which also enables devfs/dmesg/mdev/hwdrivers -- the entire hardware-bringup layer) is gated behind `[ -f "$sysroot/etc/.default_boot_services" -o ! -f "$ovl" ]` -- since our apkovl exists and never carried that marker file, this ENTIRE block was silently skipped on every boot. Fixed by touch-ing etc/.default_boot_services in boot_tree_apkovl (a documented, one-shot Alpine mechanism -- init removes the marker after reading it; rc_add itself is idempotent ln -sf, so this only ADDS the missing services alongside our own aloop/autoap/sshd/local, no conflict). Live SSH confirmed after rebuild+reboot: /lib/modules/6.6.49-0-rpi/ now populated, /proc/asound/cards now shows 3 real cards (M-Audio AIR 192 4, AKAI APC Key 25, and OUR OWN UAC2Gadget successfully enumerated), /sys/kernel/config/usb_gadget/aloop now exists. This was the root cause blocking USB gadget setup and the ALSA kernel subsystem entirely.'
