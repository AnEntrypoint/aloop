- id: img-real-genimage-pipeline
  subject: 'CORE: replace the overlay-tar stub with a REAL Alpine Pi4 .img pipeline. image/build-image.sh + build-image.yml must download the Alpine aarch64 RPi tarball, create a FAT32 boot partition (bootcode/firmware/kernel/DTBs + config.txt + cmdline.txt) + the root, lay the apkovl overlay in, and emit aloop-pi4.img. Use alpine-make-rpi-image OR a manual sfdisk+mkfs+mcopy+loopback assembly. The artifact must be a flashable .img (or .img.gz).'
  status: pending
- id: img-boot-partition-config
  subject: 'Boot partition: merge image/config/usercfg.txt (dtoverlay=dwc2,dr_mode=peripheral) into config.txt/usercfg.txt on the FAT partition, and append kernel/cmdline.txt (isolcpus=1,3 nohz_full rcu_nocbs threadirqs) to the RPi cmdline.txt so the audio cores are isolated at boot. Verify both land in the boot partition of the produced image.'
  status: pending
- id: img-apkovl-overlay-format
  subject: 'apkovl format: the overlay must be a proper Alpine local-backup (.apkovl.tar.gz) that lbu/the RPi diskless boot restores at startup — /etc/local.d/*.start, /etc/aloop*, /opt/aloop/*, /effects/**. Confirm the overlay is named/placed so Alpine RPi diskless boot auto-restores it (usually <hostname>.apkovl.tar.gz on the boot FAT partition).'
  status: pending
- id: img-openrc-services
  subject: 'OpenRC service enablement: the image must have the `local` service (runs /etc/local.d/*.start) in the boot runlevel, plus any needed base services (networking optional since autoap manages wifi). Add an rc_add/enable step so /etc/local.d/{10-rt-tune,20-usb-gadget,30-aloop}.start actually run on boot without manual intervention.'
  status: pending
- id: img-aloop-init-service
  subject: 'aloop as a supervised service: 30-aloop.start currently backgrounds the binary with & (no restart, no logging). Make aloop a proper OpenRC service (/etc/init.d/aloop) with respawn/supervise so a crash restarts it, plus stdout/err to a log. Keep autoap as its own service too. This is the difference between a demo script and an appliance.'
  status: pending
- id: img-kernel-rt-decision
  subject: 'PREEMPT_RT decision: Alpines stock linux-rpi kernel is likely NOT fully PREEMPT_RT. Decide + document: (a) ship with stock kernel + the isolcpus/threadirqs/SCHED_FIFO/mlockall tuning (reachable now, may hit latency target) and mark the PREEMPT_RT kernel build as a documented on-hardware tuning step, OR (b) build a PREEMPT_RT kernel in CI (heavy). kernel/build-rt-kernel.sh exists — assess whether it produces a usable kernel or is a stub. Decide with evidence, do not silently ship stock while docs claim RT.'
  status: pending
- id: img-validate-loopback
  subject: 'VALIDATE the produced .img WITHOUT a Pi (reachable now): in CI, loopback-mount (or use guestfish/mtools) the built aloop-pi4.img, assert the boot partition has config.txt+cmdline.txt+kernel+dwc2 overlay, and the overlay .apkovl.tar.gz contains /opt/aloop/aloop + /effects/home/*.lv2 + the local.d start scripts. Fail the build if any are missing. This proves the image is well-formed short of an actual boot.'
  status: pending
- id: img-artifact-publish
  subject: build-image.yml must upload the real aloop-pi4.img.gz as a release/CI artifact (not the overlay tar), triggered after build-binary+build-lv2 succeed, pulling their artifacts. Ensure the binary + LV2 bundle artifacts are actually downloaded and laid into the image (the current job has continue-on-error which silently ships an empty image).
  status: pending
- id: img-flash-docs
  subject: 'docs/FLASHING.md: exact steps to flash aloop-pi4.img to an SD card (dd / Raspberry Pi Imager / balena), which Pi4 port to use, how to connect USB audio to the host, first-boot expectations (LED/serial), and how to query telemetry (udp/4445, /run/aloop/status.json). The card-test procedure the user asked for.'
  status: pending
- id: img-firstboot-expansion
  subject: 'First-boot: diskless RAM boot needs no rootfs expansion, but confirm the FAT boot partition is sized for firmware+kernel+overlay and the image total size is minimal. If any writable persistence is needed (lbu commit for config changes), document it; else confirm fully read-only is intended.'
  status: pending
- id: img-binary-arch-verify
  subject: The aloop binary in the image MUST be aarch64/musl (Alpine) — verify build-binary produces an aarch64 musl static-or-Alpine-linked binary and that it is the one laid into the image, not a host binary. Check file/readelf on the artifact in the validate step.
  status: pending
- id: img-effects-user-dir
  subject: The /effects/user dir (swappable user LV2 on the free core) must exist on the image (even if empty) so the host loadDir finds it, and FLASHING.md must document how a user drops an .lv2 there (via the boot FAT partition or lbu). Confirm the image creates it.
  status: pending
- id: img-serial-console-debug
  subject: Enable a serial console (enable_uart=1 in config.txt) so first-boot/bring-up is debuggable over the Pi4 GPIO UART without a display — essential for testing from a card. Document the pins + baud in FLASHING.md.
  status: pending
- id: img-ci-image-green
  subject: 'WITNESS: build-image.yml runs green end-to-end producing + validating a real aloop-pi4.img.gz. This is the CI gate for the whole flash-ready milestone. build-image triggers on workflow_run after build-binary; ensure it also triggers on dsp/**, image/**, kernel/**, src/** changes.'
  status: pending
- id: img-consolidate-overlay-assembly
  subject: 'MAINTAINABILITY: the apkovl overlay layout is duplicated in TWO places — image/build-image.sh AND the inline bash in build-image.yml (Assemble the apkovl overlay step). They will drift. Consolidate: build-image.yml should CALL image/build-image.sh (single source of the overlay+image layout), not reimplement it inline. One script owns the device layout.'
  status: pending
