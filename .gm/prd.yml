- subject: 'ROOT CAUSE FOUND AND CONFIRMED LIVE for the no-audible-sound report: worker() pushes g_params->get(target) into the matching Faust zone EVERY block starting from the very first block, unconditionally -- but ParamStore''s constructor blanket-initializes every bound target''s value to 0.0f regardless of the Faust zone''s own compiled-in default. This meant fx/lp (bound to LPCUT, whose Faust default in dsp/effects_runtime.dsp is 1.0 = fully open) was silently forced to 0.0 (fully closed lowpass = total silence) from process start, until the user''s first physical CC turn sent a real value -- the user directly confirmed this live: ''sound appeared as soon as adjusting the lowpass''. This is a systemic bug affecting every fx/* control with a non-zero Faust default, not just LPCUT (fx/time''s TIME default is 0.5, also silently forced to 0.0 at startup). Fixed: ParamStore::bind() now takes an optional defaultVal parameter, and midi.cpp''s controls.conf-driven bind loop seeds each fx/* target with its actual Faust zone default (kFxDefaults lookup table) instead of a blanket 0.0.'
