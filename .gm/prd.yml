- id: tftp-self-update-rate-limit-handling
  subject: 'Handle GitHub API rate-limiting the same way looper''s checkAndUpdate does (tftp-server.js:54): a 403/429 response sets a rateLimitedUntil timestamp from the Retry-After header (default 60s) and the next poll tick silently skips until that time passes, rather than erroring or retrying in a tight loop.'
