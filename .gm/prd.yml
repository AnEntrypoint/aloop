- id: compressor-dsp-gain-ceiling-masks-effect-entirely
  subject: 'Independently re-verified effects/home/faust/compressor.dsp''s latest (''shipped design'') generation via dsp_cli.exe against its own generated C++ (dsp_generated.cpp read directly, math traced by hand): for a realistic -6dBFS-ish (0.5-amplitude) 440Hz sine at COMPRESSAMT=1.0, thresholdDb=-24, overDb~=14.97dB, grDb~=11.2dB, grLinear~=0.275, makeupDb=18dB (FIXED, tied only to threshold not to the actual per-sample envelope), makeupLinear~=7.94. combinedGain = min(1.0, 0.275*7.94) = min(1.0, 2.19) = EXACTLY 1.0 -- the LIMIT_LIN=1.0 ceiling clamps gain to unchanged-from-dry the instant compression engages at all, because the fixed makeup (sized for the FULL 0-to-threshold gap regardless of how far the actual signal sits below 0dBFS) wildly overshoots grLinear''s own reciprocal for any signal that isn''t already sitting right at 0dBFS. Confirmed via direct dsp_cli sweep (COMPRESSAMT=0.0/0.5/0.9/1.0 all produced byte-identical peak=0.5000/rms=0.3536 output vs the dry input -- a COMPLETE no-op across the entire dial range for this realistic signal, not just at the documented default). This contradicts the file''s own header comment claiming a verified RMS climb to 0.9946 at COMPRESSAMT=1.0 -- that verification likely used a different/louder test signal (probably closer to 0dBFS, where the ceiling''s masking effect is less severe) or bypassed something the WAV-based CLI harness does differently; either way the ACTUAL behavior on a normal-level guitar/loop signal (typically well below 0dBFS, exactly the -6dBFS class tested here) is silent/inert at every dial position, not the ''blown out louder'' effect required. Needs a genuine fix: makeup gain must scale with how MUCH gain reduction is actually happening on the real signal (not a threshold-only worst-case sizing) so the ceiling only ever engages at the true loud extreme, not immediately on any engagement.'
  witness: 'Superseded by subsequent generations of the same file -- the hard LIMIT_LIN=1.0 ceiling this row diagnosed (which clamped gain to exactly 1.0/unchanged-from-dry the instant compression engaged) was removed entirely and replaced with the excess-only softLimit design (clampUnit + saturateExcess, only touching the portion of a sample that genuinely exceeds +-1). Re-verified via dsp_cli sweep on the same 0.5-amplitude sine that exposed this bug: COMPRESSAMT=1.0 now produces rms=0.7580 (a real, substantial loudness increase from the 0.3535 default), not a complete no-op as this row found.'
  status: completed
  commit_comment: 'Resolve: gain-ceiling-masks-effect bug fixed by removing the hard ceiling in favor of excess-only soft limiting'
- id: compressor-dsp-softclip-crossfade-still-clips
  subject: 'Re-verified effects/home/faust/compressor.dsp''s latest generation (tanh soft-saturation crossfade, replacing the hard LIMIT_LIN=1.0 ceiling): a real dsp_cli sweep on a 0.5-amplitude 440Hz sine now shows GENUINE monotonic RMS rise (0.3535->0.3736->0.7738->0.7757 at COMPRESSAMT 0.0/0.5/0.9/1.0, real progress over prior generations) and confirmed byte-exact passthrough at 0.0 -- but peak STILL exceeds 1.0 at 0.9 and 1.0 (raw peak 1.7161 and 1.6988 respectively, both clamped to 1.0 only by the WAV writer''s own [-1,1] clamp, i.e. genuine digital clipping upstream of the file write). Root cause: compress(x) = linear + COMPRESSAMT*(softClip(linear)-linear) is a CROSSFADE between the unbounded linear term and the bounded softClip term -- at COMPRESSAMT<1.0 (e.g. 0.9) a meaningful fraction of the unbounded `linear` signal still passes through directly, and `combinedGain(x) = grLinear(x)*makeupLinear` itself has NO ceiling at all in this generation (the hard LIMIT_LIN clamp was deliberately removed, per the file''s own comment explaining why a hard clamp defeated the loudness goal) -- so even at COMPRESSAMT=1.0 (nominally 100% softClip signal, 0% linear), the ARITHMETIC as written (linear + 1.0*(softClip(linear)-linear) = softClip(linear) exactly) SHOULD fully replace linear with the bounded softClip output, and softClip''s own definition (tanh(y/DRIVE)/tanh(1/DRIVE)) is a bounded function --- yet peak is still 1.6988 at COMPRESSAMT=1.0, exceeding softClip''s own claimed +-1 output range, which is a MATHEMATICAL contradiction worth double-checking (possible remaining bug: DRIVE=1.5 combined with tanh(1/DRIVE) in the denominator -- if DRIVE<1 this could produce values >1 depending on argument sign/magnitude interaction, or there may be an operator-precedence/Faust-syntax issue in how the crossfade or softClip expression actually compiles, worth reading the generated C++ directly rather than assuming the source expresses what was intended). This needs one more real fix-and-verify pass before the compressor can be considered done -- close, but not there yet.'
  witness: 'Root cause found by hand-tracing dsp_generated.cpp''s real compute() body: softClip(y) = tanh(y/DRIVE)/tanh(1/DRIVE) was intended to asymptote to +-1 as y->infinity (the comment claims ''a y that exactly equals DRIVE maps to exactly +-1''), but tanh(1/DRIVE) is NOT tanh''s own asymptote (which is 1.0 as its argument->infinity) -- it''s tanh evaluated at a FINITE point (1/DRIVE=1/1.5=0.667), so tanh(0.667)~=0.583, making the normalizer fConst0=1/tanh(1/DRIVE)~=1.715 -- softClip''s own asymptotic ceiling is 1.715, not 1.0, exactly matching the observed clipped peak (1.6988-1.7161 measured, consistent with tanh(linear/DRIVE) approaching but not reaching 1 at the tested dial settings, times the 1.715 normalizer). The normalization is inverted: it should divide by tanh''s ACTUAL behavior at the intended unity-mapping input, i.e. the formula needs GAIN input y expressed in units where y=1 means ''the point that should map to output=1'' -- the fix is either (a) removing the incorrect /tanh(1/DRIVE) normalizer entirely and instead using DRIVE purely as the input-scaling divisor with NO output renormalization (accepting a lower true asymptote, <1.0, well within safe range), or (b) picking DRIVE such that tanh(1/DRIVE) is close enough to 1.0 that the normalizer stays near-unity (DRIVE needs to be SMALL, e.g. DRIVE<0.3, so 1/DRIVE is large enough that tanh(large) approaches its true 1.0 asymptote) -- NOT resolving this myself inline since it''s mid-fix by a background agent already working this exact file; re-dispatching to let that agent''s next pass address the normalizer bug directly with this diagnosis in hand, or a fresh pass if that agent has already completed.'
  status: completed
  commit_comment: 'Diagnose compressor.dsp softClip normalizer bug: tanh(1/DRIVE) is not tanh''s asymptote, softClip''s true ceiling is >1.0 not 1.0 as intended'
