ENT masterPhase value, (3) replace the current readPos~_ self-integration with an absolute recompute formula referencing masterPhase and the looper''s own offset, (4) periodic re-snap logic at phrase boundaries to kill float drift exactly as loopClipUpdate.cpp:283-296 does. This is a genuine architectural reshaping of oneLooper''s read side, not an incremental patch -- requires careful Faust design (avoid RMW/mutual-recursion rejections already hit twice this session) and thorough live hardware verification (multiple loopers recorded at different times/lengths, played simultaneously, confirmed to stay phrase-locked through glitch engagement, repeat, and varispeed changes).'
