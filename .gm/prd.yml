- id: fix-artifact-download-303-auth-bug
  subject: 'Fixed a real bug found during live witness testing: GitHub''s actions/artifacts/:id/zip endpoint returns a 303 (not 301/302) redirecting to a pre-signed Azure Blob Storage URL with its own SAS-token query string. downloadArtifactZip''s original follow() only handled 301/302 and unconditionally re-sent the GitHub Authorization header to every redirect hop, causing Azure to reject the request with 403 (an unrecognized auth header on an already-signed URL). Fixed by tracking the original host and only sending the Authorization header while still on it, plus handling 303.'
  status: completed
  witness: image/serve-netboot-win.js downloadArtifactZip now tracks originalHost = new URL(archiveUrl).host and only sets headers.Authorization when new URL(u).host === originalHost; also added res.statusCode === 303 to the redirect-follow check. Live test confirmed the fix works end to end.
- id: fix-dhcp-parser-crash-risk
  subject: 'Fix DHCP option-parser crash risk: image/serve-netboot-win.js''s dhcp.on(''message'') handler loops while(o<msg.length) reading msg[o++] with no bounds check that o+len stays within msg.length, and has no try/catch -- a single malformed/truncated DHCP packet from anything on the LAN could throw an uncaught exception and crash the whole serve process, unlike the well-guarded TFTP/HTTP paths. Fix: bounds-check the option loop and wrap the handler body in try/catch.'
  status: completed
  witness: 'image/serve-netboot-win.js: dhcp.on(''message'') handler body now wrapped in try/catch logging ''[DHCP] malformed packet, ignored''; the option-parsing loop bounds-checks o>=msg.length before reading the length byte and before reading msgType. Traced through Node''s actual Buffer semantics (out-of-range index reads return undefined, never throw) and confirmed via node -e reproduction that the original code did not actually crash on truncated/oversized-length packets -- but the defensive bounds-check + try/catch is cheap insurance against any future change to this handler (e.g. adding a readUInt16BE call, which DOES throw on a short buffer) regressing that safety.'
- id: fix-download-tmp-leak-and-log-growth
  subject: 'Fix two minor hygiene issues in image/serve-netboot-win.js: (1) downloadArtifactZip''s out-stream error path doesn''t unlink the .tmp file on failure, leaking partial downloads in .netboot-update-work over repeated failed polls; (2) LOG_FILE has no size cap/rotation and mirrors every TFTP/HTTP line, growing unbounded over long-running sessions -- add a simple size-based truncation/rotation.'
  status: completed
  witness: 'image/serve-netboot-win.js downloadArtifactZip: added res.on(''error'', cleanupAndReject) (covers the readable-side error the original only partially handled) and out.on(''error'', cleanupAndReject), where cleanupAndReject unlinks the .tmp file via fs.rmSync before rejecting -- no more leaked partial downloads. LOG_FILE mirroring now checks fs.statSync(LOG_FILE).size against a 10MiB LOG_MAX_BYTES (--log-max-bytes override) before each append and truncates with a rotation marker line when exceeded.'
