  subject: 'effects/home/faust/compressor.dsp''s own header comments (THRESH_MIN_DB''s declaration comment) claim RMS rises monotonically with COMPRESSAMT across the full 0..1 sweep and peak stays bounded (~1.06 at COMPRESSAMT=1 on a -6dBFS/0.5-amplitude sine) -- but a real sweep via dsp_cli.exe (repo root C:\dev\aloop, --gen sine:440:1.0, compressor/COMPRESSAMT=0.0/0.3/0.6/1.0) shows RMS rising 0.3535->0.3535->0.4349 (0/0.3/0.6, correctly louder) then FALLING to 0.2881 at COMPRESSAMT=1.0, while peak spikes to 1.4090 raw (clamped to 1.0 on the 16-bit WAV write, genuine digital clipping) -- exactly the ''more dial = quieter-but-clippier'' regression the file''s own comments describe as already fixed, reproducing at the actual dial extreme (1.0) even though the file''s own claimed verification apparently didn''t catch it there. Needs a real fix (likely candidates: RMS_MS=50ms envelope follower too slow relative to the makeup-gain formula''s headroom compensation at the threshold extreme, letting instantaneous peaks blow past the RMS-based gain-reduction estimate before it reacts -- add a peak-limiting safety stage after the makeup multiply, use a faster/hybrid envelope, or cap makeupDb more conservatively than the current 0.5x-of-gap heuristic) before compress-dial-at-zero-passthrough''s sibling concern (the actual chain-wiring integration) can be considered done. Also note: a separate agent working on effects_runtime.dsp''s chain wiring confirmed compressor.dsp is NOT YET wired into the guitar-bank chain at all (no shared zone/CC slot assigned in the current 7-knob ApcGrid design) -- this bug should be fixed BEFORE that wiring work happens, not after, so a broken compressor doesn''t get integrated into the live signal path.'
  witness: 'Superseded by subsequent generations of the same file (multiple further iterations, real fixes, tracked as their own PRD rows compressor-dsp-gain-ceiling-masks-effect-entirely and compressor-dsp-residual-peak-overshoot-needs-output-clamp) -- the current excess-only softLimit design (EXCESS_DRIVE=20.0) no longer exhibits this specific non-monotonic collapse: re-verified via dsp_cli sweep, RMS now rises 0.3535(0.0)->0.3535(0.5)->0.7579(0.9)->0.7580(1.0), strictly non-decreasing across the whole dial, no collapse at the extreme.'
