- subject: 'IMPLEMENTED (user, this turn): ''shift should route loops into the sample recording, for drums and all-key samples to be able to record from loopers the same way that input and effects get recorded into samplers, since loopers play into the input channel its a surprise it doesnt already do this.'' Investigation confirmed root cause: sampler''s captureBlock read fin[] BEFORE the SHIFT/glitch fold (audio_thread.cpp), so loop content never reached sample recordings regardless of SHIFT state -- matching sampler.h''s own documented (looper-verbatim) ''never records the loops'' invariant, which the user explicitly wants aloop to depart from. FIRST FIX ATTEMPT caught and corrected before shipping: simply moving captureBlock after the fold reintroduced self-recording (fin[] by that point also carries this block''s own renderInto-mixed sample playback). REAL FIX: new captureFin buffer, snapshotted from dry input before renderInto touches it, with the SAME SHIFT/glitch fold applied to it independently in the existing fold loop -- captureBlock now reads captureFin (dry input + folded loop content, no sampler voices) instead of fin (dry input + sampler voices + folded loop content). sampler.h''s top-of-file invariant comment updated to document this deliberate departure from the ../looper reference design.'
