- id: tftp-self-update-design
  subject: 'Design aloop''s self-updating netboot-serve equivalent to looper''s tftp-server.js checkAndUpdate(): looper polls GitHub Releases every 30s for a tagged looper-sd.zip asset, downloads+extracts it, rewrites the served kernel image, and sends REBOOT so the Pi picks it up. aloop has NO GitHub Releases (only CI workflow artifacts via build-binary/build-lv2/build-image), and aloop''s boot model is diskless netboot (re-fetches the WHOLE root fresh every power-cycle) rather than looper''s SD-resident kernel needing an explicit rewrite -- so the equivalent mechanism is: poll gh API for the latest green build-binary + build-lv2 CI runs, download their artifacts (aloop binary + aloop.lv2 bundle) when the run id/sha changes from the last-seen one, rebuild the apkovl with the new binary+lv2 (image/lib-boot-tree.sh''s apkovl assembly), rewrite the served netboot root in place, and send REBOOT (src/control/remote_control.cpp udp/4446, token-authenticated) to the running Pi so it re-fetches on its next boot.'
  status: completed
  witness: 'image/serve-netboot-win.js header comment (lines 10-21) documents the design: poll build-binary.yml+build-lv2.yml green runs via the GitHub Actions API, download artifacts on head_sha change, rebuild the netboot root via build-netboot.sh, REBOOT the running Pi. Confirmed via gh api that aloop''s repo has no Releases (only 3 Actions workflows) and the runs/artifacts endpoints return head_sha + archive_download_url + digest, matching looper''s asset.digest sha-tracking pattern.'
- id: tftp-self-update-no-gh-cli-dependency
  subject: Ensure the self-update mechanism does NOT require the gh CLI to be installed/authed on the machine actually running the netboot serve long-term (this Windows dev host has gh, but a dedicated always-on netboot server might not) -- use the GitHub REST API directly (https.get to api.github.com/repos/AnEntrypoint/aloop/actions/runs?...) with an optional GITHUB_TOKEN env var for higher rate limits, exactly matching looper's tftp-server.js httpsGet/downloadFile/GH_HEADERS pattern (which uses raw https, no gh CLI, no octokit dependency).
  status: completed
  witness: 'serve-netboot-win.js''s ghGet/downloadArtifactZip use raw node https.get with an Authorization: token header, no gh CLI invocation anywhere in the update path (only PowerShell''s built-in Expand-Archive for zip extraction, already used by other aloop dev scripts) -- matches looper tftp-server.js''s httpsGet/downloadFile pattern exactly, no gh/octokit dependency.'
- id: tftp-self-update-rate-limit-handling
  subject: 'Handle GitHub API rate-limiting the same way looper''s checkAndUpdate does (tftp-server.js:54): a 403/429 response sets a rateLimitedUntil timestamp from the Retry-After header (default 60s) and the next poll tick silently skips until that time passes, rather than erroring or retrying in a tight loop.'
  status: completed
  witness: 'serve-netboot-win.js latestGreenRun(): on status 403/429, sets rateLimitedUntil = Date.now() + retry-after*1000 and returns null; checkAndUpdate() checks Date.now() < rateLimitedUntil at the top of every tick and skips silently until it passes -- identical shape to looper tftp-server.js:52-54.'
