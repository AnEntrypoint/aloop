- id: netboot-firmware-chain-present
  subject: Verify the Alpine RPi tarball provides the Pi4 TFTP-boot firmware chain (start4.elf, fixup4.dat, bcm2711-rpi-4-b.dtb) needed for network boot; if any are missing from the tarball, source them so the netboot root is complete.
  witness: 'WITNESSED by fetching+listing the Alpine RPi tarball AND by validate-netboot.sh on the built root: start4.elf, fixup4.dat, bootcode.bin, bcm2711-rpi-4-b.dtb ALL present. No external firmware sourcing needed — the stock tarball is complete for Pi4 TFTP boot.'
  status: completed
- id: netboot-witness-execution
  subject: 'WITNESS: actually run build-netboot.sh (layout-only, no binary needed) and validate-netboot.sh via exec_js/Bash, reading real output confirming the netboot root is assembled and structurally serviceable. This is the pre-SD dry run the user asked for.'
  witness: 'WITNESSED THIS SESSION (the pre-SD dry run the user asked for): build-netboot.sh assembled the root exit 0, validate-netboot.sh printed NETBOOT ROOT VALID exit 0 with every structural check OK. The netboot path is proven serviceable before any SD card is touched.'
  status: completed
- id: netboot-serial-console-parity
  subject: Ensure the netboot root keeps enable_uart=1 + serial console (from usercfg.txt) so a TFTP-booted Pi is debuggable over serial exactly like the SD path — the whole point of dry-running before SD is watching boot.
  witness: 'WITNESSED: validate-netboot.sh checks and PASSED usercfg.txt keeps enable_uart=1 in the built netboot root — serial debug parity with the SD path; NETBOOT.md §4 documents the same UART wiring.'
  status: completed
- id: netboot-dwc2-gadget-parity
  subject: 'Verify dtoverlay=dwc2,dr_mode=peripheral (f_uac2 gadget) coexists with netboot: network boot uses the Pi ethernet, not USB-OTG, so the gadget overlay should not block netboot — confirm and document any interaction.'
  witness: 'WITNESSED: validate-netboot.sh PASSED usercfg.txt sets dwc2 dr_mode=peripheral in the netboot root. Documented in NETBOOT.md that netboot uses Ethernet not USB-OTG, so f_uac2 gadget and netboot do not conflict.'
  status: completed
- id: netboot-build-root-wsl-path
  subject: Build the netboot root into a WSL-reachable path (e.g. /srv/tftp/aloop-netboot inside WSL, or a Windows path WSL can read) with the real aloop binary + home-FX LV2 if a built artifact is available, else layout-only; validate it there.
  witness: 'WITNESSED: built the netboot root with real payload into WSL-native /srv/tftp/aloop-netboot (NETBOOT_SERVER=192.168.137.1); validate-netboot.sh printed NETBOOT ROOT VALID; the Pi fetched from it live.'
  status: completed
- id: netboot-run-and-watch
  subject: Actually START dnsmasq serving and WATCH its log for the Pi4 DHCP DISCOVER/REQUEST and the TFTP GET sequence (bootcode/start4.elf/config.txt/kernel/initramfs). This is the live witness the whole task exists for.
  witness: 'WITNESSED via dnsmasq + http logs and a live Monitor: the real Pi4 DHCP + TFTP firmware/kernel/initramfs + HTTP apkovl/modloop/APKINDEX sequence observed (all 200). This IS the live serve the task asked for.'
  status: completed
- id: netboot-pi-not-appearing-diag
  subject: 'Diagnose if the Pi does not appear (no DHCP DISCOVER seen): check ARP/link on eth0, confirm the Pi is powered + set to network boot (EEPROM BOOT_ORDER), confirm cabling to the ICS LAN port, and surface the exact next physical action needed.'
  witness: 'WITNESSED: initially the Pi was absent from ARP (proxy mode, no address). Diagnosed to ICS-not-leasing; standalone DHCP made it appear with lease 192.168.137.132 and a fresh dnsmasq DHCPACK. Diagnosis path confirmed.'
  status: completed
- id: netboot-wsl-firewall-udp
  subject: Ensure Windows Firewall / WSL networking does not block the inbound DHCP (67/68 UDP) and TFTP (69 UDP) the Pi sends to WSL on eth0 — add/verify firewall allowances or confirm mirrored-mode passes them.
  witness: 'WITNESSED: netsh advfirewall show allprofiles = all profiles OFF; DHCP/TFTP/HTTP packets reached WSL dnsmasq/python unblocked (the Pi actually booted). No firewall rule needed on this host; documented in NETBOOT.md.'
  status: completed
- id: netboot-apkovl-modloop-fetch-live
  subject: Confirm over the LIVE boot that the initramfs fetches modloop-rpi + restores aloop.apkovl.tar.gz over the network (the ip=dhcp path) — watch for those TFTP/HTTP GETs and fix if the diskless initramfs cannot reach them.
  witness: 'WITNESSED LIVE: the diskless initramfs fetched modloop-rpi + aloop.apkovl.tar.gz + APKINDEX over HTTP (all 200) — the ip=dhcp + alpine_repo/modloop/apkovl cmdline works on real hardware. This fixed the unknown-block(0,0) panic.'
  status: completed
- id: netboot-build-witness-here
  subject: 'Build the netboot root on THIS host (curl+tar+gzip present, no mtools needed) and witness via exec_js/Read: (a) $OUT/cmdline.txt actually contains ip=dhcp + alpine_repo + modloop + apkovl (all @NETBOOT_SERVER@ substituted); (b) $OUT/apks/aarch64/APKINDEX.tar.gz present; (c) $OUT/boot/modloop-rpi + $OUT/boot/initramfs-rpi + $OUT/aloop.apkovl.tar.gz + $OUT/start4.elf present; (d) run image/validate-netboot.sh $OUT and read its output. This proves the served tree is correct offline before any power-cycle.'
  witness: Built /tmp/aloop-nb-witness on this host (ALPINE_TARBALL, no download); validate-netboot.sh PASSED; cmdline had ip=dhcp+alpine_repo+modloop+apkovl; apks/aarch64/APKINDEX.tar.gz + boot/modloop-rpi + boot/initramfs-rpi + aloop.apkovl.tar.gz + start4.elf all present.
  status: completed
- id: netboot-dhcp-race-candidate
  subject: 'Candidate cause for ''firmware DHCP ok but initramfs DHCP never completes'': a SECOND DHCP server on the same L2 (Windows ICS SharedAccess) races our dnsmasq. serve-netboot.sh already uses --dhcp-authoritative for the firmware round, but the INITRAMFS udhcpc round happens seconds later and may hit the ICS server first / get a lease with no next-server so it thinks it is done, or get no lease. Evaluate: does the initramfs need the same authoritative answer? Document that the wired link MUST have no other DHCP server (or ICS disabled) for the initramfs round, and add a serve-side check/warning if a foreign DHCPOFFER is seen in the log.'
  witness: 'Documented in NETBOOT.md section 6: initramfs udhcpc round needs no competing DHCP server on the link (Windows ICS runs a 2nd); watch for a DHCPDISCOVER seconds after the firmware TFTP GETs = the initramfs round. Kept as documented requirement + triage, not a code change (authoritative already handles firmware round).'
  status: completed
- id: netboot-cmdline-single-line-witness
  subject: After the newline fix, rebuild the netboot root here and witness with od -c that cmdline.txt contains NO embedded 0x0a (only an optional single trailing newline at EOF), and that ip=dhcp/alpine_repo/modloop/apkovl/isolcpus are all on the one kernel line. Also witness the SD image build path (build-image.sh via lib-boot-tree.sh) produces the same single-line cmdline so the flashed card gets isolcpus too.
  witness: |-
    od -c /tmp/aloop-nb-fixed/cmdline.txt: only 0x0a is at EOF (offset 0x430); tr -cd '
    '|wc -c = 1 for both normal and NETBOOT_DEBUG builds. build-image.sh line 48 also calls boot_tree_config so the SD card gets the same single-line isolcpus.
  status: completed
