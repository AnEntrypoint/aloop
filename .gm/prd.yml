- subject: 'WITNESSED live, this turn: ''recording divisions worked, recording multiples didnt quite work it didnt take the whole length just took a piece of the end.'' Clarified: ''we want to be able to take any multiple of the loop if the start loop is 1/4 bar and the next loop is 64 bars it must also work, when we press stop of a loop just past 2 bars we dont want to keep playing till 4 bars, it must cut to whatevers closer to where we pressed, but if we press past the 3/4 mark [confirmed: 68%], it must keep recording to the multiple and not cut back.'' ROOT CAUSE: the quantization candidate search picked nearest-by-raw-distance across a SMALL FIXED SET capped at 4x the master length -- a large gap between 2M/4M meant anything past ~3M (the raw-distance midpoint) jumped all the way to 4M, extending recording far past where the user actually stopped playing (capturing mostly silence -- ''took a piece of the end'' exactly matches this), and the 4M cap meant a genuinely-intended 8M/16M/64M take had no reachable candidate at all. FIXED src/control/apc_grid.cpp: replaced the fixed-set nearest-distance search with an unbounded geometric bracket (powers of 2 via log2 of rawSamples/masterLen, correct regardless of whether raw is above or below the master length -- caught and fixed a directional-walk bug in an earlier draft before it ever reached CI) and the user''s own confirmed 68% threshold: extend to the upper candidate only if raw is past 68% of the way from the lower to upper candidate, otherwise trim to the lower one. Bounds the max possible wait-extension to 32% of one octave''s span from release, never a multi-bar jump.'
