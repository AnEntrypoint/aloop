- subject: OTG gadget PCM open/write must tolerate 'no host plugged in' or 'host not streaming' WITHOUT blocking or degrading the instrument-device's real-time audio path at all -- open OTG non-blocking (SND_PCM_NONBLOCK) or isolate its write behind a check that never lets a slow/absent OTG consumer stall the tight per-block loop.
  id: otg-gadget-pcm-open-write-must-tolerate-no-host-plugged-in-or-ho
  status: completed
