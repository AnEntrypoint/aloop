name: probe-lv2cpp-instantiate
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Install faust and dump lv2.cpp instantiate function
        run: |
          sudo apt-get update && sudo apt-get install -y faust
          FAUSTLIB=$(dirname "$(ls -f /usr/share/faust/lv2ui.cpp /usr/local/share/faust/lv2ui.cpp 2>/dev/null | tail -1)")
          grep -n "instantiate\|features" "$FAUSTLIB/lv2.cpp" | head -60
