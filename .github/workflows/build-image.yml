# Assemble the flashable Alpine SD image for the Pi 4.
#
# WHY in CI: the device image must be reproducible — a fresh checkout produces the
# same image. This job pulls the aloop binary + the home-FX LV2 bundle from the
# other workflows and runs image/build-image.sh (the SINGLE source of the device
# layout) to emit a real, bootable aloop-pi4.img, then validates it without a Pi.
name: build-image

on:
  workflow_run:
    workflows: ["build-binary"]
    types: [completed]
  push:
    paths:
      - 'image/**'
      - 'kernel/**'
      - 'src/**'
      - 'dsp/**'
      - 'config/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

jobs:
  alpine-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tools (mtools, dosfstools, fdisk, file — unprivileged FAT assembly)
        run: sudo apt-get update && sudo apt-get install -y mtools dosfstools fdisk curl gzip file

      # Pull the aloop binary + LV2 bundle produced by build-binary / build-lv2.
      # They live in DIFFERENT workflows' runs, so fetch each from the latest
      # SUCCESSFUL run of its workflow via gh (a workflow_run trigger only carries
      # its own run's artifacts). Missing artifacts don't fail the image build — it
      # still produces a valid bootable layout — but the validate step WARNS, and a
      # release build requires them.
      - name: Download aloop binary + LV2 bundle from their latest green runs
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dl/bin dl/lv2
          BIN_RUN=$(gh run list --workflow build-binary.yml --status success \
                    --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
          LV2_RUN=$(gh run list --workflow build-lv2.yml --status success \
                    --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
          echo "binary run: ${BIN_RUN:-none}   lv2 run: ${LV2_RUN:-none}"
          [ -n "$BIN_RUN" ] && gh run download "$BIN_RUN" -n aloop-aarch64-musl -D dl/bin || echo "no binary artifact yet"
          [ -n "$LV2_RUN" ] && gh run download "$LV2_RUN" -n home-fx-lv2 -D dl/lv2 || echo "no lv2 artifact yet"
          find dl -type f | head -20

      - name: Locate payload
        id: payload
        run: |
          BIN=$(find dl/bin -type f -name aloop 2>/dev/null | head -n1 || true)
          LV2=$(find dl/lv2 -maxdepth 3 -name '*.lv2' -type d 2>/dev/null | head -n1 || true)
          LV2DIR=""; [ -n "$LV2" ] && LV2DIR=$(dirname "$LV2")
          echo "bin=$BIN"   >> "$GITHUB_OUTPUT"
          echo "lv2dir=$LV2DIR" >> "$GITHUB_OUTPUT"
          echo "found binary: '${BIN:-<none>}'  lv2 dir: '${LV2DIR:-<none>}'"

      - name: Build the flashable image (image/build-image.sh)
        env:
          ALOOP_BIN: ${{ steps.payload.outputs.bin }}
          LV2_DIR: ${{ steps.payload.outputs.lv2dir }}
          OUT: aloop-pi4.img
        run: |
          chmod +x image/build-image.sh
          image/build-image.sh
          gzip -9 -k aloop-pi4.img
          ls -la aloop-pi4.img aloop-pi4.img.gz

      - name: Validate the image without a Pi (partition + boot files + overlay)
        run: |
          chmod +x image/validate-image.sh
          image/validate-image.sh aloop-pi4.img

      # The netboot root is the SAME diskless tree (shared image/lib-boot-tree.sh),
      # laid into a plain TFTP directory instead of a FAT image — the pre-SD dry-run
      # path (docs/NETBOOT.md). Build + structurally validate it in CI so it can
      # never drift from the SD image or silently rot.
      - name: Build + validate the TFTP netboot root
        env:
          ALOOP_BIN: ${{ steps.payload.outputs.bin }}
          LV2_DIR: ${{ steps.payload.outputs.lv2dir }}
          OUT: aloop-netboot
        run: |
          chmod +x image/build-netboot.sh image/validate-netboot.sh
          image/build-netboot.sh
          image/validate-netboot.sh aloop-netboot
          tar -czf aloop-netboot.tar.gz aloop-netboot
          ls -la aloop-netboot.tar.gz

      - name: Upload flashable image
        uses: actions/upload-artifact@v4
        with:
          name: aloop-pi4-image
          path: aloop-pi4.img.gz
          if-no-files-found: error

      - name: Upload netboot root
        uses: actions/upload-artifact@v4
        with:
          name: aloop-netboot-root
          path: aloop-netboot.tar.gz
          if-no-files-found: error
