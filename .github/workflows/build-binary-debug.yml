# TEMPORARY debug-symbols build for investigating a live-Pi-4-witnessed SIGSEGV
# in the audio worker thread (see .gm/prd.yml row
# reopen-audio-thread-segfault-investigation). Manual-trigger only
# (workflow_dispatch) — never runs on push/PR, never affects the real Release
# artifact build-binary.yml produces. Delete this file once the crash is
# root-caused and fixed; it exists purely to get DWARF symbols + no strip so
# gdb can resolve source lines/locals against a real core dump, which the
# stripped Release binary cannot provide.
name: build-binary-debug

on:
  workflow_dispatch:

jobs:
  aloop-aarch64-musl-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for aarch64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pre-generate the Faust loop engine C++ (on the host, where faust exists)
        run: |
          sudo apt-get update && sudo apt-get install -y faust
          mkdir -p build-debug
          faust -lang cpp -cn AloopLoopDsp -I dsp -I effects/home/faust dsp/aloop.dsp -o build-debug/loop.cpp

      - name: Build in an Alpine aarch64 container (Debug, no strip)
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/w -w /w alpine:3.20 sh -c '
            set -e
            apk add --no-cache build-base cmake pkgconf git \
              alsa-lib-dev lilv-dev lv2-dev \
              linux-headers eudev-dev gdb
            cmake -S src -B build-debug -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-g -O0 -fno-omit-frame-pointer"
            cmake --build build-debug -j"$(nproc)"
            ls -la build-debug/aloop
          '

      - name: Upload debug binary (with DWARF symbols, unstripped)
        uses: actions/upload-artifact@v4
        with:
          name: aloop-aarch64-musl-debug
          path: build-debug/aloop
