name: probe-faust2lv2
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Full manual faust2lv2-equivalent, musl/aarch64 .so
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y faust lv2-dev pkg-config build-essential libboost-dev
          FAUSTLIB=$(dirname "$(ls -f /usr/share/faust/lv2ui.cpp /usr/local/share/faust/lv2ui.cpp 2>/dev/null | tail -1)")
          FAUSTINC=$(which faust | sed -e 's?/bin/faust?/include/faust?')
          echo "FAUSTLIB=$FAUSTLIB FAUSTINC=$FAUSTINC"

          cd effects/home/faust
          CLSNAME=guitar_lofi_fx
          WORK=/tmp/lv2work
          mkdir -p "$WORK/$CLSNAME.lv2"

          # Step 1 (Ubuntu, real Faust): generate the self-contained C++ (matches
          # faust2lv2's own `faust -i -a lv2.cpp ...` line exactly).
          faust -i -a "$FAUSTLIB/lv2.cpp" -cn "$CLSNAME" \
            -DFAUST_META=1 -DFAUST_MIDICC=1 -DFAUST_MTS=1 -DFAUST_UI=0 -DVOICE_CTRLS=1 -DNVOICES=-1 \
            "$CLSNAME.dsp" -o "$WORK/$CLSNAME.cpp"
          wc -l "$WORK/$CLSNAME.cpp"

          CPPFLAGS="-DPLUGIN_URI=\"https://faustlv2.bitbucket.io/$CLSNAME\" -DFAUST_META=1 -DFAUST_MIDICC=1 -DFAUST_MTS=1 -DFAUST_UI=0 -DVOICE_CTRLS=1 -DNVOICES=-1"

          # Step 2 (Ubuntu, native host compiler): compile+run to dump the plugin's
          # OWN .ttl metadata -- matches faust2lv2's $HOST_CXX step exactly. This
          # binary runs on the HOST (never touches musl/aarch64 at all).
          g++ -std=c++11 -fvisibility=hidden -O3 -DDLLEXT="\".so\"" $CPPFLAGS \
            -I"$(pwd)" "$WORK/$CLSNAME.cpp" -o "$WORK/$CLSNAME.meta"
          "$WORK/$CLSNAME.meta" > "$WORK/$CLSNAME.lv2/$CLSNAME.ttl"
          echo "--- generated ttl ---"
          cat "$WORK/$CLSNAME.lv2/$CLSNAME.ttl"

          # Step 3: the manifest.ttl (faust2lv2's static-manifest branch, no GUI).
          sed -e "s?@name@?$CLSNAME?g" -e "s?@uri@?https://faustlv2.bitbucket.io/$CLSNAME?g" -e "s?@dllext@?.so?g" > "$WORK/$CLSNAME.lv2/manifest.ttl" <<'EOF'
@prefix doap: <http://usefulinc.com/ns/doap#> .
@prefix foaf: <http://xmlns.com/foaf/0.1/> .
@prefix lv2:  <http://lv2plug.in/ns/lv2core#> .
@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .

<@uri@>
    a lv2:Plugin ;
    lv2:binary <@name@@dllext@> ;
    rdfs:seeAlso <@name@.ttl> .
EOF

          # Step 4 (Alpine aarch64, QEMU): the ACTUAL shared library, cross-compiled
          # to musl/aarch64 -- the one piece that must match the device's real libc+arch.
          cp "$WORK/$CLSNAME.cpp" .
          docker run --rm --platform linux/arm64 -v "$PWD":/w -w /w alpine:3.20 sh -c "
            set -e
            apk add --no-cache build-base lv2-dev boost-dev
            g++ -shared -std=c++11 -fvisibility=hidden -O3 -fPIC -DDLLEXT='\".so\"' $CPPFLAGS \
              -I. '$CLSNAME.cpp' -o '$CLSNAME.so'
            file '$CLSNAME.so'
          "
          cp "$CLSNAME.so" "$WORK/$CLSNAME.lv2/"
          ls -la "$WORK/$CLSNAME.lv2/"
          file "$WORK/$CLSNAME.lv2/$CLSNAME.so"
