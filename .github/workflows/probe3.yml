name: probe-lv2-map-usage
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Dump instantiate + map usage context
        run: |
          sudo apt-get update && sudo apt-get install -y faust
          FAUSTLIB=$(dirname "$(ls -f /usr/share/faust/lv2ui.cpp /usr/local/share/faust/lv2ui.cpp 2>/dev/null | tail -1)")
          sed -n '1600,1660p' "$FAUSTLIB/lv2.cpp"
          echo "=== map-> usage elsewhere ==="
          grep -n "map->\|plugin->map\|\.map\b" "$FAUSTLIB/lv2.cpp" | head -40
