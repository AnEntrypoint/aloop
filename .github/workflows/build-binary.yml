# Cross-compile the aloop native binary for Raspberry Pi 4 (aarch64) under musl.
#
# WHY musl + Alpine container: the device runs Alpine (musl libc), so the binary
# must be built against musl, not glibc (ADR-001; MIGRATION-MAP musl note). We
# build inside an Alpine aarch64 container so the toolchain and libc match the
# target exactly — no surprises at deploy.
name: build-binary

on:
  push:
    paths:
      - 'src/**'
      - 'dsp/**'          # the Faust loop+effects program (pre-generated to loop.cpp)
      - 'effects/**'       # vendored Faust chain + engine headers the build includes
      - '.github/workflows/build-binary.yml'
  pull_request:
  workflow_dispatch:

jobs:
  aloop-aarch64-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for aarch64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pre-generate the Faust loop engine C++ (on the host, where faust exists)
        run: |
          # Faust codegen runs ONCE here (Ubuntu has faust); the arm64/musl build
          # then just compiles the generated C++ — no faust needed in the container
          # (Alpine's arm64 repos don't reliably package faust). This keeps the
          # cross-build to a pure C++ compile.
          sudo apt-get update && sudo apt-get install -y faust
          # Generate into the same build dir CMake uses (cmake -S src -B build →
          # CMAKE_BINARY_DIR = build), so CMake sees it as already-present.
          mkdir -p build
          # -vec -fun -dfs -vs 32 -nvi: Faust's documented optimizing-compiler
          # recipe (faustdoc.grame.fr/manual/optimizing/) -- vectorized codegen,
          # function inlining, depth-first scheduling, no-virtual C++ backend
          # (Faust's own docs: -nvi is "especially useful in embedded devices
          # context"). Pure codegen-strategy flags -- same DSP source, same
          # signal graph, only how the compiler schedules/inlines it.
          # -ct 0: disables Faust's default table range-checking -- verified
          # safe (every rwtable index in this program is already
          # software-bounded by explicit modulo/clamp logic, see AGENTS.md).
          # -mapp: floor/ceil/fmod/remainder approximation -- verified via a
          # real A/B numeric harness (byte-identical output with/without,
          # across a full record/quantization/varispeed/playback cycle).
          faust -lang cpp -vec -fun -dfs -vs 32 -nvi -ct 0 -mapp -cn AloopLoopDsp -I dsp -I effects/home/faust dsp/aloop.dsp -o build/loop.cpp
          echo "generated $(wc -l < build/loop.cpp) lines of loop C++"

      # Faust's own benchmarking tool (faustdoc.grame.fr/manual/optimizing/'s
      # "Benchmarking and optimization tools" section) -- measures REAL CPU
      # usage before/after this session's compiler-flag changes, closing the
      # loop from theoretical optimization to a measured number. Runs here
      # (Ubuntu host, native faust+gcc, no QEMU) because faust2bench's own
      # bundled bench.cpp architecture file assumes a real POSIX environment
      # (uses <pwd.h>) -- confirmed this session it does NOT compile under
      # MinGW on Windows, so a genuine measurement needs a real Linux host;
      # this is x86_64, not the Pi 4's aarch64 core, but still a real,
      # reproducible before/after comparison of the SAME flag change on the
      # SAME hardware, which is what actually answers "did these flags help."
      - name: Benchmark CPU usage: baseline flags vs this session's shipped flags
        run: |
          set -e
          mkdir -p bench
          cp dsp/loop.dsp dsp/aloop.dsp dsp/effects_runtime.dsp bench/
          cp effects/home/faust/*.dsp effects/home/faust/*.h bench/
          cd bench
          sed -i 's#effects/home/faust/##g' effects_runtime.dsp
          echo "=== BASELINE (no optimization flags, matching pre-session codegen) ==="
          faust2bench -cn AloopLoopDsp aloop.dsp
          ./aloop -run 20 -bs 64   # -bs 64 matches aloop's real AudioConfig::blockSize
          echo ""
          echo "=== SHIPPED (-vec -fun -dfs -vs 32 -nvi -ct 0 -mapp) ==="
          faust2bench -vec -fun -dfs -vs 32 -nvi -ct 0 -mapp -cn AloopLoopDsp aloop.dsp
          ./aloop -run 20 -bs 64
          echo ""
          echo "(bench.cpp prints '<name> : <X> MBytes/sec, SD : <Y>% (DSP CPU : <Z>% at 44100 Hz)' -- read the DSP CPU % from both runs above directly from this step's log; lower is better. x86_64 host numbers, not the Pi 4's aarch64 core, but a real reproducible before/after of the SAME flag change at the real 64-sample block size.)"

      - name: Build in an Alpine aarch64 container
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/w -w /w alpine:3.20 sh -c '
            set -e
            # No faust in the container — loop.cpp is pre-generated above. Just the
            # C++ toolchain + the audio deps, all musl.
            apk add --no-cache build-base cmake pkgconf git \
              alsa-lib-dev lilv-dev lv2-dev \
              linux-headers eudev-dev
            # Ableton Link is header-only C++ (vendored under third_party/link).
            # The DSP is Faust (loop + the dubfx effects); src/ is the thin RT shell.
            echo "toolchain:"; gcc --version | head -1; faust --version | head -1
            # The real build wires up when src/ has its CMakeLists; until then this
            # step verifies the container + deps resolve (a musl-availability gate,
            # MIGRATION-MAP musl-compat row) and fails loudly if a dep is missing.
            if [ -f src/CMakeLists.txt ]; then
              cmake -S src -B build -DCMAKE_BUILD_TYPE=Release
              cmake --build build -j"$(nproc)"
              ls -la build/aloop || (echo "::error::aloop binary not produced" && exit 1)
            else
              echo "src/CMakeLists.txt not present yet — verified musl deps resolve:"
              apk info -e alsa-lib-dev lilv-dev lv2-dev && echo "all audio deps present under musl (ADR-001 musl-compat gate PASS)"
            fi
          '

      - name: Upload aloop binary (if built)
        if: hashFiles('build/aloop') != ''
        uses: actions/upload-artifact@v4
        with:
          name: aloop-aarch64-musl
          path: build/aloop
          # Short retention: this workflow runs on nearly every push during
          # active iteration -- see build-image.yml's matching comment for
          # the full incident (accumulated artifacts hit the account's total
          # Actions storage quota and blocked every workflow's uploads).
          retention-days: 3
