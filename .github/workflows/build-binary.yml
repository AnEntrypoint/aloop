# Cross-compile the aloop native binary for Raspberry Pi 4 (aarch64) under musl.
#
# WHY musl + Alpine container: the device runs Alpine (musl libc), so the binary
# must be built against musl, not glibc (ADR-001; MIGRATION-MAP musl note). We
# build inside an Alpine aarch64 container so the toolchain and libc match the
# target exactly — no surprises at deploy.
name: build-binary

on:
  push:
    paths:
      - 'src/**'
      - 'dsp/**'          # the Faust loop+effects program (pre-generated to loop.cpp)
      - 'effects/**'       # vendored Faust chain + engine headers the build includes
      - '.github/workflows/build-binary.yml'
  pull_request:
  workflow_dispatch:

jobs:
  aloop-aarch64-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for aarch64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pre-generate the Faust loop engine C++ (on the host, where faust exists)
        run: |
          # Faust codegen runs ONCE here (Ubuntu has faust); the arm64/musl build
          # then just compiles the generated C++ — no faust needed in the container
          # (Alpine's arm64 repos don't reliably package faust). This keeps the
          # cross-build to a pure C++ compile.
          sudo apt-get update && sudo apt-get install -y faust
          # Generate into the same build dir CMake uses (cmake -S src -B build →
          # CMAKE_BINARY_DIR = build), so CMake sees it as already-present.
          mkdir -p build
          faust -lang cpp -cn AloopLoopDsp -I dsp -I effects/home/faust dsp/aloop.dsp -o build/loop.cpp
          echo "generated $(wc -l < build/loop.cpp) lines of loop C++"

      - name: Build in an Alpine aarch64 container
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/w -w /w alpine:3.20 sh -c '
            set -e
            # No faust in the container — loop.cpp is pre-generated above. Just the
            # C++ toolchain + the audio deps, all musl.
            apk add --no-cache build-base cmake pkgconf git \
              alsa-lib-dev lilv-dev lv2-dev \
              linux-headers eudev-dev
            # Ableton Link is header-only C++ (vendored under third_party/link).
            # The DSP is Faust (loop + the dubfx effects); src/ is the thin RT shell.
            echo "toolchain:"; gcc --version | head -1; faust --version | head -1
            # The real build wires up when src/ has its CMakeLists; until then this
            # step verifies the container + deps resolve (a musl-availability gate,
            # MIGRATION-MAP musl-compat row) and fails loudly if a dep is missing.
            if [ -f src/CMakeLists.txt ]; then
              cmake -S src -B build -DCMAKE_BUILD_TYPE=Release
              cmake --build build -j"$(nproc)"
              ls -la build/aloop || (echo "::error::aloop binary not produced" && exit 1)
            else
              echo "src/CMakeLists.txt not present yet — verified musl deps resolve:"
              apk info -e alsa-lib-dev lilv-dev lv2-dev && echo "all audio deps present under musl (ADR-001 musl-compat gate PASS)"
            fi
          '

      - name: Upload aloop binary (if built)
        if: hashFiles('build/aloop') != ''
        uses: actions/upload-artifact@v4
        with:
          name: aloop-aarch64-musl
          path: build/aloop
