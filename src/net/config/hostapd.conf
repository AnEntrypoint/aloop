# aloop AP-mode config (autoAP fallback — used only when no known network is up).
# WHY ap_isolate=0: Ableton Link discovers peers over multicast; if the AP
# isolated clients from each other, peer devices could not see each other or the
# Pi for Link. So isolation is OFF (ADR-007, docs/ARCHITECTURE.md).
interface=wlan0
driver=nl80211
ssid=aloop
hw_mode=g
channel=6
auth_algs=1
wmm_enabled=1
ap_isolate=0
# Open network by default (looper's "ticker" AP was open); set wpa=2 + a
# passphrase here to secure it.
# wpa=2
# wpa_passphrase=changeme
# wpa_key_mgmt=WPA-PSK
# rsn_pairwise=CCMP
