# aloop Pi 4 NETBOOT server (host-side, NOT on the device).
#
# WHY separate from dnsmasq.conf: that file is the DEVICE's AP-mode DHCP (the Pi
# hands out addresses when hosting its own AP for Ableton Link). THIS file runs on
# a Linux HOST on the same wired LAN as the Pi, to serve the Pi's network boot over
# DHCP + TFTP — the pre-SD dry run (docs/NETBOOT.md).
#
# Run it (as root, on the host) — override the wired interface + TFTP root:
#   dnsmasq --conf-file=src/net/config/netboot-dnsmasq.conf \
#           --interface=eth0 --tftp-root=$PWD/aloop-netboot -d
# `-d` keeps it in the foreground so you can watch the TFTP transfers.

# --- The wired LAN the Pi boots on ---------------------------------------------
# Set to your host's LAN NIC (the one cabled to the Pi / switch). Do NOT run this
# on a network that already has a DHCP server unless you use proxy-dhcp (below).
interface=eth0
bind-interfaces

# --- DHCP ----------------------------------------------------------------------
# Standalone DHCP for an isolated Pi<->host link. If you instead have an existing
# DHCP server on the LAN, comment out dhcp-range and use proxy DHCP so this box
# only answers the PXE/TFTP part:
#   dhcp-range=192.168.50.0,proxy
dhcp-range=192.168.50.50,192.168.50.150,255.255.255.0,12h

# --- Pi 4 network-boot: point the bootloader at the TFTP root ------------------
# The Pi 4 bootloader identifies itself with DHCP vendor class "PXEClient" and
# (Raspberry-specific) option 43. Answer with option 43 = "Raspberry Pi Boot" so
# the firmware proceeds to TFTP, and set the TFTP server to this host.
dhcp-vendorclass=set:rpi,PXEClient
dhcp-option=vendor:PXEClient,6,2b
dhcp-option-force=tag:rpi,43,"Raspberry Pi Boot"
# TFTP server = this host (dnsmasq fills next-server with its own address).
enable-tftp
# tftp-root is passed on the command line (--tftp-root=.../aloop-netboot) so the
# same conf works from any checkout; uncomment + hardcode if you prefer:
#tftp-root=/srv/tftp/aloop-netboot

# The Pi 4 fetches by its serial number as a subdirectory by default; tftp-unique-root
# maps requests to <tftp-root>/<serial>/. For a single Pi, serving the root directly
# (files at the top of tftp-root) also works — see docs/NETBOOT.md.
tftp-unique-root

# Quiet the DNS side — this box is a boot server, not a resolver.
port=0
log-dhcp
