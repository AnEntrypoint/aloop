# aloop Pi 4 NETBOOT server (host-side, NOT on the device).
#
# WHY separate from dnsmasq.conf: that file is the DEVICE's AP-mode DHCP (the Pi
# hands out addresses when hosting its own AP for Ableton Link). THIS file is the
# host-side DHCP+TFTP reference config for netbooting the Pi (docs/NETBOOT.md).
#
# PREFER image/serve-netboot.sh — it runs dnsmasq (these flags) PLUS the HTTP root
# server the diskless initramfs needs, handles the per-serial TFTP subdir
# automatically, and encodes the exact setup witnessed booting a real Pi 4. This
# conf is the equivalent dnsmasq-only config for when you want to run dnsmasq by
# hand; you must ALSO serve the netboot root over HTTP :8080 (see NETBOOT.md §5),
# or the initramfs panics "unable to mount root fs".
#
# Run it (as root) — override the wired interface + TFTP root:
#   dnsmasq --conf-file=src/net/config/netboot-dnsmasq.conf \
#           --interface=eth0 --tftp-root=/srv/tftp/aloop-netboot -d
# `-d` keeps it in the foreground so you can watch the DHCP + TFTP transfers.

# --- The wired LAN the Pi boots on ---------------------------------------------
# Set to your host's LAN NIC (the one cabled to the Pi / switch).
interface=eth0
bind-interfaces
except-interface=lo

# --- DHCP ----------------------------------------------------------------------
# STANDALONE DHCP (this box owns the lease). This is the witnessed-working default:
# on the tested Windows-ICS link, ICS did NOT lease the Pi, so proxy mode left it
# with no address and it never reached TFTP. dhcp-boot names the first file the Pi
# 4 firmware asks for. Adjust the range to your link's subnet.
#   PROXY alternative (only if another DHCP server already leases the Pi):
#     comment dhcp-range below and use:  dhcp-range=192.168.137.0,proxy
dhcp-range=192.168.137.50,192.168.137.150,255.255.255.0,1h
dhcp-boot=bootcode.bin

# --- Pi 4 network-boot: point the bootloader at the TFTP root ------------------
# The Pi 4 bootloader identifies itself with DHCP vendor class "PXEClient" and
# (Raspberry-specific) option 43. Answer with option 43 = "Raspberry Pi Boot" so
# the firmware proceeds to TFTP, and set the TFTP server to this host.
dhcp-vendorclass=set:rpi,PXEClient
dhcp-option-force=tag:rpi,43,"Raspberry Pi Boot"
# TFTP server = this host (dnsmasq fills next-server with its own address).
enable-tftp
tftp-no-fail
# tftp-root is passed on the command line (--tftp-root=/srv/tftp/aloop-netboot).

# NOTE on the per-serial subdir: the Pi 4 requests files under its BOARD SERIAL
# (e.g. 7bec0617/start4.elf) — NOT its MAC, so `tftp-unique-root` (mac by default)
# does NOT match and is intentionally omitted here. Serve the netboot root flat and
# create <tftp-root>/<serial>/ as symlinks to the root (image/serve-netboot.sh does
# this automatically from the first TFTP request); the Pi then resolves <serial>/*.

# Quiet the DNS side — this box is a boot server, not a resolver.
port=0
log-dhcp
